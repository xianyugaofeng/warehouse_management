{% extends "base.html" %}
{% block title %}添加入库单 - 仓库管理系统{% endblock %}

{% block js %}      <!--JavaScript脚本 用于处理入库单表单的动态交互和验证-->
    <!--动态添加入库明细行-->
    <!--删除指定的入库明细行-->
    <!--在表单提交时进行验证,确保至少有一条明细,且所有数量都大于0-->
    <script>
        // 在DOM结构加载完成后立即执行代码的方法,不必等待图片,视频等资源完全加载
        $(document).ready(function() {
            //动态添加入库明细行
            let rowIndex = 0;
            $("#addItemBtn").click(function() {
                rowIndex++;
                const newRow = `
                    <tr id="itemRow${rowIndex}" class="transition-all duration-300 hover:bg-gray-50">
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-shopping-bag text-gray-400"></i>
                                </span>
                                <select class="form-select product-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="product_id[]" required style="flex: 1;">
                                    <option value="">请选择商品</option>
                                    {% for product in products %}
                                        <option value="{{ product.id }}">
                                            {{ product.name }} ({{ product.code }})
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-map-marker text-gray-400"></i>
                                </span>
                                <select class="form-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="location_id[]" required style="flex: 1;">
                                    <option value="">请选择库位</option>
                                    {% for location in locations %}
                                        <option value="{{ location.id }}">
                                            {{ location.code }} - {{ location.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-hashtag text-gray-400"></i>
                                </span>
                                <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="batch_no[]" placeholder="批次号(选填)" style="flex: 1;">
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-cubes text-gray-400"></i>
                                </span>
                                <input type="number" class="form-control quantity-input rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="quantity[]" min="1" required placeholder="数量" style="flex: 1; min-width: 80px;">
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-calendar text-gray-400"></i>
                                </span>
                                <input type="date" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="production_date[]" style="flex: 1;">
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-calendar-times-o text-gray-400"></i>
                                </span>
                                <input type="date" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="expire_date[]" style="flex: 1;">
                            </div>
                        </td>
                        <td class="py-3 px-4 border-b border-gray-200 text-center">
                            <button type="button" class="btn btn-sm btn-danger rounded-lg hover:bg-red-600 transform hover:-translate-y-1 transition-all duration-300 remove-item" data-row="${rowIndex}">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                //将新创建的行追加到ID为itemTableBody的元素(表格体)中
                $("#itemTableBody").append(newRow);
            });
            //删除明细行
            //使用事件委托,为所有具有remove-item类的元素(包括动态添加的)绑定点击事件
            $(document).on("click", ".remove-item", function() {
                const rowId = $(this).data("row");      //获取当前jQuery对象上存储的名为row的数据值
                //这个数据可以是通过HTML5的data-row属性设置的
                $(`#itemRow${rowId}`).remove();     //当点击删除按钮时，获取该按钮的data-row属性值，然后移除对应ID的行
            });
            //表单提交验证 该事件只适用于<form>元素
            $("form").submit(function() {       //为表单的提交事件绑定验证函数
                const hasItems = $("#itemTableBody tr").length > 0;     //检查表格中是否有明细行即itemTableBody中是否有行
                //如果没有，弹出警告并阻止提交
                if (!hasItems) {
                    alert("请至少添加一条入库明细!");
                    return false;
                }
                // 验证数量输入
                let isValid = true;
                // 遍历所有数量输入框
                $(".quantity-input").each(function() {      //each()方法为每个匹配元素规定要运行的函数
                    if ($(this).val() <= 0 || !$(this).val()) {    //检查每个输入框的值是否大于0且不为空
                        alert("数量必须大于0!");     //如果有任何一个不满足条件，则弹出警告并阻止提交
                        isValid = false;
                        return false;
                    }
                });
                return isValid;     //如果所有验证都通过，则允许表单提交
            });
        });
    </script>
{% endblock %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-6">      
        <h2 class="text-2xl font-bold text-gray-800 flex items-center">
            <i class="fa fa-arrow-down mr-3 text-primary"></i>添加入库单
        </h2>
        <nav aria-label="breadcrumb">       <!--无障碍访问标签，为屏幕阅读器描述这是面包屑导航-->
            <ol class="breadcrumb">         <!--Bootstrap 面包屑导航样式-->
                <li class="breadcrumb-item"><a href="{{ url_for('inbound.list') }}">入库管理</a></li>
                <li class="breadcrumb-item active" aria-current="page">添加入库单</li>
                <!--breadcrumb-item active:面包屑项高亮显示-->
            </ol>
        </nav>
    </div>

    <div class="card mb-6 shadow-sm rounded-xl overflow-hidden">
        <div class="card-body p-6">
            <form method="POST" action="{{ url_for('inbound.add') }}">
                <!--入库单基本信息-->
                <div class="row mb-4">      <!--Bootstrap栅格行 下边距1.5em-->
                    <div class="col-md-6 mb-3">
                        <label for="supplier_id" class="form-label">供应商<span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-building text-gray-400"></i>
                            </span>
                            <select class="form-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="supplier_id" name="supplier_id">
                                <option value="">请选择供应商</option>
                                {% for supplier in suppliers %}
                                    <option value="{{ supplier.id }}">
                                        {{ supplier.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <!--Bootstrap 栅格系统的自动换行功能-->
                    <div class="col-md-6 mb-3">
                        <label for="inbound_date" class="form-label">入库日期<span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-calendar text-gray-400"></i>
                            </span>
                            <input type="date" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="inbound_date" name="inbound_date" value="{{ now.strftime('%Y-%m-%d') if now else '' }}" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="remark" class="form-label">备注</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-comment text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="remark" name="remark" placeholder="输入备注信息(选填)">
                        </div>
                    </div>
                </div>

                <hr class="my-4 border-gray-200">   <!--水平分隔线-->

                <!--入库明细-->
                <div class="mb-6">  <!--下边距为1.5rem 容器包裹整个入库明细区域-->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <!--子元素水平排列 两端对齐 垂直居中-->
                        <h5 class="text-lg font-semibold text-gray-700">入库明细</h5>
                        <button type="button" id="addItemBtn" class="btn btn-sm btn-primary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                            <i class="fa fa-plus mr-1"></i>添加明细      <!--已为#addItemBtn按钮绑定click事件-->
                        </button>           <!--绑定事件:为表格添加明细行-->
                    </div>
                    <div class="table-responsive">
                        <table class="table table-bordered rounded-lg overflow-hidden">
                            <thead class="bg-gray-50">
                                <tr class="text-gray-700 border-b-2 border-gray-300">
                                    <th width="20%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">商品</th>
                                    <th width="15%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">库位</th>
                                    <th width="14%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">批次号</th>
                                    <th width="15%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">数量</th>
                                    <th width="12%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">生产日期</th>
                                    <th width="12%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">过期日期</th>
                                    <th width="12%" class="py-3 px-4 font-semibold text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="itemTableBody" class="bg-white">      <!--用于click事件动态添加表格明细行-->
                                <!--初始空行-->
                                <tr id="itemRow0" class="transition-all duration-300 hover:bg-gray-50">
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group" style="width: 100%;">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-shopping-bag text-gray-400"></i>
                                            </span>
                                            <select class="form-select product-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="product_id[]" required style="flex: 1;">
                                                <option value="">请选择商品</option>
                                                {% for product in products %}
                                                    <option value="{{ product.id }}">
                                                        {{ product.name }} ({{ product.code }})
                                                    </option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group" style="width: 100%;">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-map-marker text-gray-400"></i>
                                            </span>
                                            <select class="form-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="location_id[]" required style="flex: 1;">
                                                <option value="">请选择库位</option>
                                                {% for location in locations %}
                                                    <option value="{{ location.id }}">
                                                        {{ location.code }} - {{ location.name }}
                                                    </option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group" style="width: 100%;">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-hashtag text-gray-400"></i>
                                            </span>
                                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="batch_no[]" placeholder="批次号(选填)" style="flex: 1;">
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group" style="width: 100%;">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-cubes text-gray-400"></i>
                                            </span>
                                            <input type="number" class="form-control quantity-input rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="quantity[]" min="1" required placeholder="数量" style="flex: 1; min-width: 80px;">
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group" style="width: 100%;">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-calendar text-gray-400"></i>
                                            </span>
                                            <input type="date" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="production_date[]" style="flex: 1;">
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group" style="width: 100%;">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-calendar-times-o text-gray-400"></i>
                                            </span>
                                            <input type="date" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="expire_date[]" style="flex: 1;">
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-b border-gray-200 text-center">
                                        <button type="button" class="btn btn-sm btn-danger rounded-lg hover:bg-red-600 transform hover:-translate-y-1 transition-all duration-300 remove-item" data-row="0">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!--提交按钮-->
                <div class="d-flex gap-2">      <!--Bootstrap弹性布局 子元素之间间距 0.5rem -->
                    <button type="submit" class="btn btn-primary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                        <i class="fa fa-check mr-2"></i>提交入库单
                    </button>
                    <a href="{{ url_for('inbound.list') }}" class="btn btn-outline-secondary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                        <i class="fa fa-times mr-2"></i>取消
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <style>
        /* 自定义动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .card {
            animation: fadeInUp 0.5s ease-out;
        }
        
        h2 {
            animation: slideIn 0.4s ease-out;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .input-group {
                font-size: 0.875rem;
            }
            
            .btn {
                font-size: 0.75rem;
                padding: 0.25rem 0.5rem;
            }
            
            .table-responsive {
                font-size: 0.875rem;
            }
            
            .table th,
            .table td {
                padding: 0.75rem;
            }
        }
    </style>
{% endblock %}
