{% extends "base.html" %}
{% block title %}添加入库单 - 仓库管理系统{% endblock %}

{% block js %}      <!--JavaScript脚本 用于处理入库单表单的动态交互和验证-->
    <!--动态添加入库明细行-->
    <!--删除指定的入库明细行-->
    <!--在表单提交时进行验证,确保至少有一条明细,且所有数量都大于0-->
    <script>
        // 在DOM结构加载完成后立即执行代码的方法,不必等待图片,视频等资源完全加载
        $(document).ready(function() {
            //动态添加入库明细行
            let rowIndex = 0;
            $("#addItemBtn").click(function() {
                rowIndex++;
                const newRow = `
                    <tr id="itemRow${rowIndex}">
                        <td>
                            <select class="form-select product-select" name="product_id[]" required>
                                <option value="">请选择商品</option>
                                {% for product in products %}
                                    <option value="{{ product.id }}">
                                        {{ product.name }} ({{ product.code }})
                                    </option>
                                {% endfor %}
                            </select>
                        </td>
                        <td>
                            <select class="form-select" name="location_id[]" required>
                                <option value="">请选择库位</option>
                                {% for location in locations %}
                                    <option value="{{ location.id }}">
                                        {{ location.code }} - {{ location.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </td>
                        <td>
                            <input type="text" class="form-control" name="batch_no[]" placeholder="批次号(选填)">
                        </td>
                        <td>
                            <input type="number" class="form-control quantity-input" name="quantity[]" min="1" required placeholder="数量">
                        </td>
                        <td>
                            <input type="date" class="form-control" name="production_date[]">
                        </td>
                        <td>
                            <input type="date" class="form-control" name="expire_date[]">
                        </td>
                        <td>
                            <button type="button" class="btn btn-sm btn-danger remove-item" data-row="${rowIndex}">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                //将新创建的行追加到ID为itemTableBody的元素(表格体)中
                $("#itemTableBody").append(newRow);
            });
            //删除明细行
            //使用事件委托,为所有具有remove-item类的元素(包括动态添加的)绑定点击事件
            $(document).on("click", ".remove-item", function() {
                const rowId = $(this).data("row");      //获取当前jQuery对象上存储的名为row的数据值
                //这个数据可以是通过HTML5的data-row属性设置的
                $(`#itemRow${rowId}`).remove();     //当点击删除按钮时，获取该按钮的data-row属性值，然后移除对应ID的行
            });
            //表单提交验证 该事件只适用于<form>元素
            $("form").submit(function() {       //为表单的提交事件绑定验证函数
                const hasItems = $("#itemTableBody tr").length > 0;     //检查表格中是否有明细行即itemTableBody中是否有行
                //如果没有，弹出警告并阻止提交
                if (!hasItems) {
                    alert("请至少添加一条入库明细!");
                    return false;
                }
                // 验证数量输入
                let isValid = true;
                // 遍历所有数量输入框
                $(".quantity-input").each(function() {      //each()方法为每个匹配元素规定要运行的函数
                    if ($(this).val() <= 0 || !$(this).val()) {    //检查每个输入框的值是否大于0且不为空
                        alert("数量必须大于0!");     //如果有任何一个不满足条件，则弹出警告并阻止提交
                        isValid = false;
                        return false;
                    }
                });
                return isValid;     //如果所有验证都通过，则允许表单提交
            });
        });
    </script>
{% endblock %}

{% block content %}
    <div class="row mb-4">      <!--Bootstrap行布局 下边距1.5em-->
        <div class="col">
            <h2>添加入库单</h2>
            <nav aria-label="breadcrumb">       <!--无障碍访问标签，为屏幕阅读器描述这是面包屑导航-->
                <ol class="breadcrumb">         <!--Bootstrap 面包屑导航样式-->
                    <li class="breadcrumb-item"><a href="{{ url_for('inbound.list') }}">入库管理</a></li>
                    <li class="breadcrumb-item active" aria-current="page">添加入库单</li>
                    <!--breadcrumb-item active:面包屑项高亮显示-->
                </ol>
            </nav>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form method="POST" action="{{ url_for('inbound.add') }}">
                <!--入库单基本信息-->
                <div class="row mb-4">      <!--Bootstrap栅格行 下边距1.5em-->
                    <div class="col-md-6 mb-3">
                        <label for="supplier_id" class="form-label">供应商<span class="text-danger">*</span></label>
                        <select class="form-select" id="supplier_id" name="supplier_id">
                            <option value="">请选择供应商</option>
                            {% for supplier in suppliers %}
                                <option value="{{ supplier.id }}">
                                    {{ supplier.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!--Bootstrap 栅格系统的自动换行功能-->
                    <div class="col-md-6 mb-3">
                        <label for="inbound_date" class="form-label">入库日期<span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="inbound_date" name="inbound_date" value="{{ now.strftime('%Y-%m-%d') if now else '' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="remark" class="form-label">备注</label>
                        <input type="text" class="form-control" id="remark" name="remark" placeholder="输入备注信息(选填)">
                    </div>
                </div>

                <hr>   <!--水平分隔线-->

                <!--入库明细-->
                <div class="mb-4">  <!--下边距为1.5rem 容器包裹整个入库明细区域-->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <!--子元素水平排列 两端对齐 垂直居中-->
                        <h5>入库明细</h5>
                        <button type="button" id="addItemBtn" class="btn btn-sm btn-outline-primary">
                            <i class="fa fa-plus"></i>添加明细      <!--已为#addItemBtn按钮绑定click事件-->
                        </button>           <!--绑定事件:为表格添加明细行-->
                    </div>
                    <div class="table-responsive">
                        <table class="table table-bordered">
                            <thead class="table-light">
                                <tr>
                                    <th width="20%">商品</th>
                                    <th width="15%">库位</th>
                                    <th width="15%">批次号</th>
                                    <th width="10%">数量</th>
                                    <th width="15%">生产日期</th>
                                    <th width="15%">过期日期</th>
                                    <th width="10%">操作</th>
                                </tr>
                            </thead>
                            <tbody id="itemTableBody">      <!--用于click事件动态添加表格明细行-->
                                <!--初始空行-->
                                <tr id="itemRow0">
                                    <td>
                                        <select class="form-select product-select" name="product_id[]" required>
                                            <option value="">请选择商品</option>
                                            {% for product in products %}
                                                <option value="{{ product.id }}">
                                                    {{ product.name }} ({{ product.code }})
                                                </option>
                                            {% endfor %}
                                        </select>
                                    </td>
                                    <td>
                                        <select class="form-select" name="location_id[]" required>
                                            <option value="">请选择库位</option>
                                            {% for location in locations %}
                                                <option value="{{ location.id }}">
                                                    {{ location.code }} - {{ location.name }}
                                                </option>
                                            {% endfor %}
                                        </select>
                                    </td>
                                    <td>
                                        <input type="text" class="form-control" name="batch_no[]" placeholder="批次号(选填)">
                                    </td>
                                    <td>
                                        <input type="number" class="form-control quantity-input" name="quantity[]" min="1" required placeholder="数量">
                                    </td>
                                    <td>
                                        <input type="date" class="form-control" name="production_date[]">
                                    </td>
                                    <td>
                                        <input type="date" class="form-control" name="expire_date[]">
                                    </td>
                                    <td>
                                        <button type="button" class="btn btn-sm btn-danger remove-item" data-row="0">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!--提交按钮-->
                <div class="d-flex gap-2">      <!--Bootstrap弹性布局 子元素之间间距 0.5rem -->
                    <button type="submit" class="btn btn-primary">提交入库单</button>
                    <a href="{{ url_for('inbound.list') }}" class="btn btn-outline-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
