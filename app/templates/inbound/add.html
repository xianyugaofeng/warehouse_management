{% extends "base.html" %}
{% block title %}添加入库单 - 仓库管理系统{% endblock %}

{% block js %}      <!--JavaScript脚本 用于处理入库单表单的动态交互和验证-->
    <!--动态添加入库明细行-->
    <!--删除指定的入库明细行-->
    <!--在表单提交时进行验证,确保至少有一条明细,且所有数量都大于0-->
    <script>
        // 在DOM结构加载完成后立即执行代码的方法,不必等待图片,视频等资源完全加载
        $(document).ready(function() {
            //动态添加入库明细行
            let rowIndex = 0;
            $("#addItemBtn").click(function() {
                rowIndex++;
                const newRow = `
                    <tr id="itemRow${rowIndex}" class="transition-all duration-300 hover:bg-gray-50">
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-shopping-bag text-gray-400"></i>
                                </span>
                                <select class="form-select product-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="product_id[]" required style="flex: 1;">
                                    <option value="">请选择商品</option>
                                    {% for product in products %}
                                        <option value="{{ product.id }}">
                                            {{ product.name }} ({{ product.code }})
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-map-marker text-gray-400"></i>
                                </span>
                                <select class="form-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="location_id[]" required style="flex: 1;">
                                    <option value="">请选择库位</option>
                                    {% for location in locations %}
                                        <option value="{{ location.id }}">
                                            {{ location.code }} - {{ location.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-hashtag text-gray-400"></i>
                                </span>
                                <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="batch_no[]" placeholder="批次号(选填)" style="flex: 1;">
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-cubes text-gray-400"></i>
                                </span>
                                <input type="number" class="form-control quantity-input rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="quantity[]" min="1" required placeholder="数量" style="flex: 1; min-width: 80px;">
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-calendar text-gray-400"></i>
                                </span>
                                <input type="date" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="production_date[]" style="flex: 1;">
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-calendar-times-o text-gray-400"></i>
                                </span>
                                <input type="date" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="expire_date[]" style="flex: 1;">
                            </div>
                        </td>
                        <td class="py-3 px-4 border-b border-gray-200 text-center">
                            <button type="button" class="btn btn-sm btn-danger rounded-lg hover:bg-red-600 transform hover:-translate-y-1 transition-all duration-300 remove-item" data-row="${rowIndex}">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                //将新创建的行追加到ID为itemTableBody的元素(表格体)中
                $("#itemTableBody").append(newRow);
            });
            //删除明细行
            //使用事件委托,为所有具有remove-item类的元素(包括动态添加的)绑定点击事件
            $(document).on("click", ".remove-item", function() {
                const rowId = $(this).data("row");      //获取当前jQuery对象上存储的名为row的数据值
                //这个数据可以是通过HTML5的data-row属性设置的
                $(`#itemRow${rowId}`).remove();     //当点击删除按钮时，获取该按钮的data-row属性值，然后移除对应ID的行
            });
            //表单提交验证 该事件只适用于<form>元素
            $("form").submit(function() {       //为表单的提交事件绑定验证函数
                const hasItems = $("#itemTableBody tr").length > 0;     //检查表格中是否有明细行即itemTableBody中是否有行
                //如果没有，弹出警告并阻止提交
                if (!hasItems) {
                    alert("请至少添加一条入库明细!");
                    return false;
                }
                // 验证数量输入
                let isValid = true;
                // 遍历所有数量输入框
                $(".quantity-input").each(function() {      //each()方法为每个匹配元素规定要运行的函数
                    if ($(this).val() <= 0 || !$(this).val()) {    //检查每个输入框的值是否大于0且不为空
                        alert("数量必须大于0!");     //如果有任何一个不满足条件，则弹出警告并阻止提交
                        isValid = false;
                        return false;
                    }
                });
                return isValid;     //如果所有验证都通过，则允许表单提交
            });
        });
    </script>
{% endblock %}

{% block content %}
    <style>
        /* 页面标题霓虹效果 */

            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #b24bf3, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            position: relative;
        }

            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff, #667eea);

            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);

        .breadcrumb-item a {
            color: #667eea;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .breadcrumb-item a:hover {
            color: #b24bf3;

        }
        
        .breadcrumb-item.active {
            color: #b24bf3;

        }
        
        /* 表单卡片 - 渐变蓝紫边框 */

            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);

            border-radius: 20px;
            border: 3px solid transparent;
            background-clip: padding-box;

                0 0 40px rgba(102, 126, 234, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.8);
            position: relative;
            padding: 2rem;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .form-card::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(135deg, #00d4ff, #667eea, #b24bf3);
            border-radius: 22px;
            z-index: -1;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 表单标签样式 */
        .form-label {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.6rem;
            font-size: 1rem;
            letter-spacing: 0.3px;
        }
        
        .form-label .text-danger {
            margin-left: 3px;
            font-size: 1.1rem;
        }
        
        /* 输入框组样式 */
        .input-group {
            position: relative;
        }
        
        .input-group-text {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px 0 0 12px;
            color: #ffffff;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        
        .input-group-text i {
            font-size: 1.1rem;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }
        
        .input-group:focus-within .input-group-text {
            background: linear-gradient(135deg, #00d4ff, #667eea);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
        
        .form-control, .form-select {
            border: 2px solid rgba(102, 126, 234, 0.3);

            padding: 0.75rem 1rem;

            color: #1e293b;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.98);
        }

            border-color: #00d4ff;

            background: #ffffff;
            color: #0f172a;
        }
        
        .form-control::placeholder {
            color: #64748b;
            font-weight: 400;
        }
        
        /* 表格样式 */
        .item-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            border-radius: 12px;
        }
        
        .item-table thead {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }
        
        .item-table thead::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shineEffect 3s infinite;
        }
        
        @keyframes shineEffect {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .item-table th {
            padding: 1rem 1.25rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }
        
        .item-table td {
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid rgba(102, 126, 234, 0.15);
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .item-table tbody tr {
            transition: all 0.3s ease;
        }
        
        .item-table tbody tr:hover {
            background: rgba(102, 126, 234, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.15);
        }
        
        /* 按钮样式 */
        .btn-save {
            background: linear-gradient(135deg, #00d4ff, #667eea, #b24bf3);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            padding: 0.85rem 2.2rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 25px rgba(0, 212, 255, 0.4), 0 0 30px rgba(178, 75, 243, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .btn-save i {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }
        
        .btn-save::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-save:hover::before {
            left: 100%;
        }
        
        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(0, 212, 255, 0.6), 0 0 50px rgba(178, 75, 243, 0.4);
            color: #ffffff;
        }
        
        .btn-cancel {
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #667eea;
            border-radius: 12px;
            color: #667eea;
            padding: 0.7rem 2.2rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        
        .btn-cancel i {
            text-shadow: none;
        }
        
        .btn-cancel:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-cancel:hover i {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }
        
        .btn-add-item {
            background: linear-gradient(135deg, #00d4ff, #667eea);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            padding: 0.45rem 0.9rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(0, 212, 255, 0.3);
        }
        
        .btn-add-item:hover {
            background: linear-gradient(135deg, #667eea, #00d4ff);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.5);
            color: #ffffff;
        }
        
        .btn-delete-item {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            padding: 0.45rem 0.9rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(255, 107, 107, 0.3);
        }
        
        .btn-delete-item:hover {
            background: linear-gradient(135deg, #ee5a6f, #ff6b6b);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.5);
            color: #ffffff;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .form-card {
                padding: 1.25rem;
            }
            
            .page-title {
                font-size: 1.35rem;
            }
            
            .page-title-icon {

                height: 40px;
                margin-right: 10px;
            }
            
            .page-title-icon i {
                font-size: 1.2rem;
            }
            
            .breadcrumb {
                display: none;
            }
            
            .btn-save, .btn-cancel {
                padding: 0.6rem 1.25rem;
                font-size: 0.875rem;
            }
            
            .btn-add-item, .btn-delete-item {
                padding: 0.35rem 0.75rem;
                font-size: 0.75rem;
            }
            
            .item-table th,
            .item-table td {
                padding: 0.75rem;
                font-size: 0.875rem;
            }
        }
    </style>

                                    </div>
                                </td>
                                <td>
                                    <div class="input-group" style="width: 100%;">
                                        <span class="input-group-text">
                                            <i class="fa fa-calendar"></i>
                                        </span>
                                        <input type="date" class="form-control" name="production_date[]" style="flex: 1;">
                                    </div>
                                </td>
                                <td>
                                    <div class="input-group" style="width: 100%;">
                                        <span class="input-group-text">
                                            <i class="fa fa-calendar-times-o"></i>
                                        </span>
                                        <input type="date" class="form-control" name="expire_date[]" style="flex: 1;">
                                    </div>
                                </td>
                                <td class="text-center">
                                    <button type="button" class="btn btn-delete-item remove-item" data-row="0">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!--提交按钮-->
            <div class="d-flex gap-3">      <!--Bootstrap弹性布局 子元素之间间距 0.5rem -->
                <button type="submit" class="btn btn-save">
                    <i class="fa fa-check mr-2"></i>提交入库单
                </button>
                <a href="{{ url_for('inbound.list') }}" class="btn btn-cancel">
                    <i class="fa fa-times mr-2"></i>取消
                </a>
            </div>
        </form>
    </div>
    
    <script>
        // 更新JavaScript代码中的按钮类名
        $(document).ready(function() {
            let rowIndex = 0;
            $("#addItemBtn").click(function() {
                rowIndex++;
                const newRow = `
                    <tr id="itemRow${rowIndex}">
                        <td>
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text">
                                    <i class="fa fa-shopping-bag"></i>
                                </span>
                                <select class="form-select product-select" name="product_id[]" required style="flex: 1;">
                                    <option value="">请选择商品</option>
                                    {% for product in products %}
                                        <option value="{{ product.id }}">
                                            {{ product.name }} ({{ product.code }})
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td>
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text">
                                    <i class="fa fa-map-marker"></i>
                                </span>
                                <select class="form-select" name="location_id[]" required style="flex: 1;">
                                    <option value="">请选择库位</option>
                                    {% for location in locations %}
                                        <option value="{{ location.id }}">
                                            {{ location.code }} - {{ location.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td>
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text">
                                    <i class="fa fa-hashtag"></i>
                                </span>
                                <input type="text" class="form-control" name="batch_no[]" placeholder="批次号(选填)" style="flex: 1;">
                            </div>
                        </td>
                        <td>
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text">
                                    <i class="fa fa-cubes"></i>
                                </span>
                                <input type="number" class="form-control quantity-input" name="quantity[]" min="1" required placeholder="数量" style="flex: 1; min-width: 80px;">
                            </div>
                        </td>
                        <td>
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text">
                                    <i class="fa fa-calendar"></i>
                                </span>
                                <input type="date" class="form-control" name="production_date[]" style="flex: 1;">
                            </div>
                        </td>
                        <td>
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text">
                                    <i class="fa fa-calendar-times-o"></i>
                                </span>
                                <input type="date" class="form-control" name="expire_date[]" style="flex: 1;">
                            </div>
                        </td>
                        <td class="text-center">
                            <button type="button" class="btn btn-delete-item remove-item" data-row="${rowIndex}">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                $("#itemTableBody").append(newRow);
            });
            
            $(document).on("click", ".remove-item", function() {
                const rowId = $(this).data("row");
                $(`#itemRow${rowId}`).remove();
            });
            
            $("form").submit(function() {
                const hasItems = $("#itemTableBody tr").length > 0;
                if (!hasItems) {
                    alert("请至少添加一条入库明细!");
                    return false;
                }
                
                let isValid = true;
                $("input[name='quantity[]']").each(function() {
                    if ($(this).val() <= 0 || !$(this).val()) {
                        alert("数量必须大于0!");
                        isValid = false;
                        return false;
                    }
                });
                return isValid;
            });
        });
    </script>
{% endblock %}
