{% extends "base.html" %}
{% block title %}添加入库单 - 仓库管理系统{% endblock %}

{% block js %}
    <script>
        $(document).ready(function() {
            // 表单提交验证
            $("form").submit(function() {
                const quantity = parseInt($("#quantity").val());
                if (!quantity || quantity <= 0) {
                    alert("数量必须大于0!");
                    return false;
                }
                return true;
            });
        });
    </script>
{% endblock %}

{% block content %}
    <div class="row mb-4">
        <div class="col">
            <h2>添加入库单</h2>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('inbound.list') }}">入库管理</a></li>
                    <li class="breadcrumb-item active" aria-current="page">添加入库单</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="alert alert-info" role="alert">
        <i class="fa fa-info-circle"></i> <strong>提示：</strong>入库操作需要提供采购单号、送货单号和检验合格单号，系统将自动从待处理区转移库存至等待区。
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form method="POST" action="{{ url_for('inbound.add') }}">
                <!--入库单基本信息-->
                <div class="row mb-4">
                    <div class="col-md-6 mb-3">
                        <label for="supplier_id" class="form-label">供应商</label>
                        <select class="form-select" id="supplier_id" name="supplier_id">
                            <option value="">请选择供应商</option>
                            {% for supplier in suppliers %}
                                <option value="{{ supplier.id }}">
                                    {{ supplier.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="product_id" class="form-label">商品<span class="text-danger">*</span></label>
                        <select class="form-select" id="product_id" name="product_id" required>
                            <option value="">请选择商品</option>
                            {% for product in products %}
                                <option value="{{ product.id }}">
                                    {{ product.name }} ({{ product.code }})
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="related_order" class="form-label">采购单号<span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="related_order" name="related_order" placeholder="输入采购单号" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="delivery_order_no" class="form-label">正式送货单号<span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="delivery_order_no" name="delivery_order_no" placeholder="输入采购部门签发的正式送货单号" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="inspection_cert_no" class="form-label">检验合格单号<span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="inspection_cert_no" name="inspection_cert_no" placeholder="输入质量管理部门出具的检验合格单号" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="inbound_date" class="form-label">入库日期<span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="inbound_date" name="inbound_date" value="{{ now.strftime('%Y-%m-%d') if now else '' }}" required>
                    </div>
                </div>

                <hr>

                <!--入库明细-->
                <div class="mb-4">
                    <h5 class="mb-3">入库明细</h5>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="quantity" class="form-label">数量<span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="quantity" name="quantity" min="1" required placeholder="入库数量">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="unit_price" class="form-label">单价<span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="unit_price" name="unit_price" min="0" step="0.01" required placeholder="单价">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="batch_no" class="form-label">批次号</label>
                            <input type="text" class="form-control" id="batch_no" name="batch_no" placeholder="留空自动生成">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="production_date" class="form-label">生产日期</label>
                            <input type="date" class="form-control" id="production_date" name="production_date">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="expire_date" class="form-label">过期日期</label>
                            <input type="date" class="form-control" id="expire_date" name="expire_date">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="remark" class="form-label">备注</label>
                            <input type="text" class="form-control" id="remark" name="remark" placeholder="输入备注信息(选填)">
                        </div>
                    </div>
                </div>

                <!--提交按钮-->
                <div class="d-flex gap-2">      <!--Bootstrap弹性布局 子元素之间间距 0.5rem -->
                    <button type="submit" class="btn btn-primary">提交入库单</button>
                    <a href="{{ url_for('inbound.list') }}" class="btn btn-outline-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
