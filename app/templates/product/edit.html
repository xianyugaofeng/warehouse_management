{% extends "base.html" %}
{% block title %}{% if product.id %}编辑商品{% else %}添加商品{% endif %} - 仓库管理系统{% endblock %}

{% block content %}
<div class="row mb-4">    <!--Bootstrap行布局 下边距1.5em-->
    <div class="col">    <!--Bootstrap 列，自动占用所有可用宽度-->
        <h2>{% if product.id %}编辑商品{% else %}添加商品{% endif %}</h2>
        <nav aria-label="breadcrumb">       <!--无障碍访问标签，为屏幕阅读器描述这是面包屑导航-->
            <ol class="breadcrumb">     <!--Bootstrap 面包屑导航样式-->
                <li class="breadcrumb-item"><a href="{{ url_for('product.list') }}">商品管理</a></li>
                <li class="breadcrumb-item active" aria-current="page">{% if product.id %}编辑商品{% else %}添加商品{% endif %}</li>
                <!--breadcrumb-item active：当前激活的面包屑项-->
            </ol>
        </nav>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('product.edit', id=product.id) }}">
            <!--提交到 product.edit 路由 product.id 在添加模式下可能为 0 或空，由后端处理-->
            <div class="row mb-3">      <!--Bootstrap栅格行-->
                <div class="col-md-6">
                    <label for="code" class="form-label">商品编码<span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="code" name="code" value="{{ product.code or '' }}" required placeholder="请输入唯一商品编码">
                </div>
                <div class="col-md-6">
                    <label for=""
                </div>
            </div>
        </form>
    </div>
</div>
