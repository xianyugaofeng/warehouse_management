{% extends "base.html" %}
{% block title %}创建盘点任务 - 仓库管理系统{% endblock %}

{% block content %}
    <div class="row mb-4">
        <div class="col">
            <h2>创建盘点任务</h2>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item">
                        <a href="{{ url_for('inventory_count.task_list') }}">盘点任务管理</a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page">
                        创建盘点任务
                    </li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h2>创建盘点任务</h2>
            <form method="POST" action="{{ url_for('inventory_count.task_create') }}">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">任务名称<span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="请输入任务名称">
                    </div>
                    <div class="col-md-6">
                        <label for="type" class="form-label">任务类型<span class="text-danger">*</span></label>
                        <select class="form-select" id="type" name="type" required>
                            <option value="">请选择任务类型</option>
                            <option value="time">时间触发</option>
                            <option value="area">区域触发</option>
                            <option value="threshold">阈值触发</option>
                        </select>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label for="area" class="form-label">盘点区域</label>
                        <input type="text" class="form-control" id="area" name="area" placeholder="例如: A区、B区等">
                    </div>
                    <div class="col-md-4">
                        <label for="supplier_id" class="form-label">供应商</label>
                        <select class="form-select" id="supplier_id" name="supplier_id">
                            <option value="">请选择供应商</option>
                            {% for supplier in suppliers %}
                                <option value="{{ supplier.id }}">{{ supplier.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="location_id" class="form-label">库位</label>
                        <select class="form-select" id="location_id" name="location_id">
                            <option value="">请选择库位</option>
                            {% for location in locations %}
                                <option value="{{ location.id }}">{{ location.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="cycle_days" class="form-label">周期天数(时间触发时必填)</label>
                        <input type="number" class="form-control" id="cycle_days" name="cycle_days" min="1" placeholder="例如: 30">
                    </div>
                    <div class="col-md-6">
                        <label for="threshold" class="form-label">阈值(阈值触发时必填)</label>
                        <input type="number" class="form-control" id="threshold" name="threshold" min="1" placeholder="例如: 10">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="remark" class="form-label">备注</label>
                    <textarea class="form-control" id="remark" name="remark" rows="3" placeholder="请输入备注信息"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <a href="{{ url_for('inventory_count.task_list') }}" class="btn btn-outline-secondary">
                        取消
                    </a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
