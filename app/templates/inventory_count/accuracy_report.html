{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="mt-4">库存准确率报表</h1>
    <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item active">库存准确率趋势</li>
    </ol>
    
    <div class="card mb-4">
        <div class="card-header">
            <h5>库存准确率趋势分析</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-12">
                    <div id="accuracyChart" style="width: 100%; height: 400px;"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="card mb-4">
        <div class="card-header">
            <h5>准确率明细</h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>总盘点项数</th>
                            <th>准确项数</th>
                            <th>准确率</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for acc in accuracies %}
                        <tr>
                            <td>{{ acc.date.strftime('%Y-%m-%d') }}</td>
                            <td>{{ acc.total_items }}</td>
                            <td>{{ acc.accurate_items }}</td>
                            <td>{{ "%.2f"|format(acc.accuracy_rate) }}%</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
    // 初始化ECharts实例
    var chart = echarts.init(document.getElementById('accuracyChart'));
    
    // 准备数据
    var dates = {{ dates|tojson }};
    var rates = {{ rates|tojson }};
    
    // 配置项
    var option = {
        title: {
            text: '库存准确率趋势',
            left: 'center'
        },
        tooltip: {
            trigger: 'axis',
            formatter: function(params) {
                return params[0].name + '<br/>准确率: ' + params[0].value + '%';
            }
        },
        xAxis: {
            type: 'category',
            data: dates,
            axisLabel: {
                rotate: 45
            }
        },
        yAxis: {
            type: 'value',
            min: 80,
            max: 100,
            axisLabel: {
                formatter: '{value}%'
            }
        },
        series: [{
            data: rates,
            type: 'line',
            smooth: true,
            itemStyle: {
                color: '#4CAF50'
            },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{
                    offset: 0,
                    color: 'rgba(76, 175, 80, 0.5)'
                }, {
                    offset: 1,
                    color: 'rgba(76, 175, 80, 0.1)'
                }])
            }
        }]
    };
    
    // 使用配置项
    chart.setOption(option);
    
    // 响应式调整
    window.addEventListener('resize', function() {
        chart.resize();
    });
</script>
{% endblock %}
