{% extends "base.html" %}

{% block title %}创建退货单{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <h2>创建退货单</h2>
            <div class="card">
                <div class="card-header">
                    <h3>退货基本信息</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        <div class="form-group">
                            <label for="remark">备注</label>
                            <textarea class="form-control" id="remark" name="remark" rows="2"></textarea>
                        </div>
                        
                        <h3 class="mt-4">退货明细</h3>
                        <div id="return-items">
                            <div class="return-item mb-3 p-3 border rounded">
                                <div class="form-row">
                                    <div class="form-group col-md-3">
                                        <label>商品</label>
                                        <select class="form-control" name="product_id" required>
                                            <option value="">选择商品</option>
                                            {% for defective in defective_products %}
                                            <option value="{{ defective.product_id }}" data-unit-price="0.0" data-location-id="{{ defective.location_id }}" data-batch-no="{{ defective.batch_no }}">
                                                {{ defective.product.name }} ({{ defective.location.code }} - 批次: {{ defective.batch_no }} - 数量: {{ defective.quantity }})
                                            </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="form-group col-md-2">
                                        <label>库位</label>
                                        <input type="text" class="form-control" name="location_id" readonly>
                                    </div>
                                    <div class="form-group col-md-2">
                                        <label>批次号</label>
                                        <input type="text" class="form-control" name="batch_no" readonly>
                                    </div>
                                    <div class="form-group col-md-1">
                                        <label>数量</label>
                                        <input type="number" class="form-control" name="quantity" min="1" required>
                                    </div>
                                    <div class="form-group col-md-1">
                                        <label>单价</label>
                                        <input type="number" class="form-control" name="unit_price" step="0.01" min="0.01" required>
                                    </div>
                                    <div class="form-group col-md-2">
                                        <label>不合格原因</label>
                                        <select class="form-control" name="defect_reason" required>
                                            <option value="">选择原因</option>
                                            {% for reason in defect_reasons %}
                                            <option value="{{ reason }}">{{ reason }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="form-group col-md-1">
                                        <label>操作</label>
                                        <button type="button" class="btn btn-danger btn-block remove-item">删除</button>
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group col-md-12">
                                        <label>备注</label>
                                        <input type="text" class="form-control" name="item_remark">
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <button type="button" class="btn btn-primary mb-3" id="add-item">添加商品</button>
                        <button type="submit" class="btn btn-success">提交</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// 复制商品选择事件
function setupItemEvents() {
    // 商品选择事件
    document.querySelectorAll('select[name="product_id"]').forEach(select => {
        select.addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            const unitPrice = selectedOption.getAttribute('data-unit-price');
            const locationId = selectedOption.getAttribute('data-location-id');
            const batchNo = selectedOption.getAttribute('data-batch-no');
            
            // 更新对应的值
            const itemDiv = this.closest('.return-item');
            itemDiv.querySelector('input[name="unit_price"]').value = unitPrice;
            itemDiv.querySelector('input[name="location_id"]').value = locationId;
            itemDiv.querySelector('input[name="batch_no"]').value = batchNo;
        });
    });
    
    // 删除按钮事件
    document.querySelectorAll('.remove-item').forEach(button => {
        button.addEventListener('click', function() {
            const itemDiv = this.closest('.return-item');
            if (document.querySelectorAll('.return-item').length > 1) {
                itemDiv.remove();
            } else {
                alert('至少需要一个商品');
            }
        });
    });
}

// 初始化事件
setupItemEvents();

// 添加商品按钮事件
document.getElementById('add-item').addEventListener('click', function() {
    const itemsContainer = document.getElementById('return-items');
    const firstItem = itemsContainer.querySelector('.return-item');
    const newItem = firstItem.cloneNode(true);
    
    // 清空值
    newItem.querySelectorAll('input, select').forEach(input => {
        if (input.type !== 'hidden') {
            input.value = '';
        }
    });
    
    itemsContainer.appendChild(newItem);
    setupItemEvents();
});
</script>
{% endblock %}
