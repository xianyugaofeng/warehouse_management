{% extends "base.html" %}
{% block title %}注册 - 仓库管理系统{% endblock %}

{% block content %}
    <div class="row justify-content-center mt-8">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm rounded-xl overflow-hidden">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h4 class="mb-0 text-xl font-bold">用户注册</h4>
                </div>
                <div class="card-body p-6">
                    <form method="POST" action="{{ url_for('auth.register') }}">
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="username" class="form-label">
                                    用户名<span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                        <i class="fa fa-user text-gray-400"></i>
                                    </span>
                                    <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="username" name="username" required placeholder="请输入用户名">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="password" class="form-label">
                                    密码<span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                        <i class="fa fa-lock text-gray-400"></i>
                                    </span>
                                    <input type="password" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="password" name="password" required placeholder="请输入密码">
                                </div>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="real_name" class="form-label">真实姓名</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                        <i class="fa fa-id-card text-gray-400"></i>
                                    </span>
                                    <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="real_name" name="real_name" placeholder="请输入真实姓名">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="phone" class="form-label">手机号</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                        <i class="fa fa-phone text-gray-400"></i>
                                    </span>
                                    <input type="tel" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="phone" name="phone" placeholder="请输入手机号">
                                </div>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="email" class="form-label">邮箱</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-envelope text-gray-400"></i>
                                </span>
                                <input type="email" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="email" name="email" placeholder="请输入邮箱">
                            </div>
                        </div>
                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-primary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                                <i class="fa fa-user-plus mr-2"></i>注册
                            </button>
                            <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                                <i class="fa fa-arrow-left mr-2"></i>返回登录
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <style>
        /* 自定义动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card {
            animation: fadeInUp 0.5s ease-out;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .input-group {
                font-size: 0.875rem;
            }
            
            .btn {
                font-size: 0.75rem;
                padding: 0.25rem 0.5rem;
            }
        }
    </style>
{% endblock %}
