{% extends "base.html" %}
{% block title %}注册 - 仓库管理系统{% endblock %}

{% block content %}
    <div class="row justify-content-center mt-4">       <!--Bootstrap行布局-->
        <div class="col-md-8 col-lg-6">      <!--注册表单在不同屏幕尺寸下有不同的宽度-->
            <div class="card shadow-sm">      <!--Bootstrap 卡片组件-->
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">用户注册</h4>
                </div>
            </div>
                <div class="card-body p-4">      <!--内边距1.5rem-->
                    <form method="POST" action="{{ url_for('auth.register') }}">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="username" class="form-label">       <!--Bootstrap标签样式-->
                                    用户名<span class="text-danger">*</span>     <!--text-danger是一个用于设置文本颜色的类，通常用于表示错误或警告信息-->
                                </label>
                                <input type="text" class="form-control" id="username" name="username" required placeholder="请输入用户名">
                                <!--Bootstrap 表单控件样式-->
                            </div>
                            <div class="col-mb-6">
                                <label for="password" class="form-label">
                                    密码<span class="text-danger">*</span>
                                </label>
                                <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="real_name" class="form-label">真实姓名</label>
                                <input type="text" class="form-control" id="real_name" name="real_name" placeholder="请输入真实姓名">
                            </div>              <!--没有 required 属性，表示非必填-->
                            <div class="col-md-6">
                                <label for="phone" class="form-label">手机号</label>
                                <input type="tel" class="form-control" id="phone" name="phone" placeholder="请输入手机号">
                                <!--type="tel"：电话输入框，移动设备上可能弹出数字键盘-->
                            </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="请输入邮箱">
                        </div>
                        <div class="d-grid gap-2">     <!--d-grid：Bootstrap 网格布局，使按钮占满容器宽度 gap-2：按钮之间间距 0.5rem--> 
                            <button type="submit" class="btn btn-primary">注册</button>     <!--Bootstrap 主要按钮样式（蓝色）-->
                            <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary">返回登录</a>
                        </div>                                    <!--Bootstrap 次要按钮样式（灰色边框）-->
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
