{% extend "base.html" %}
{% block title}登录 - 仓库管理系统{% endblock %}

{% block content %}
    <div class="row justify-content-center mt-5">     <!--上边距 5em-->
        <div class="col-md-6 col-lg-4">     <!--中等屏幕及以上占 6 列 大屏幕及以上占 4 列-->
            <div class="card shadow-sm">    <!--用于为元素添加轻微的阴影效果-->
                <div class="card-header bg-primary text-white text-center">     <!--卡片头部蓝色背景白色文字文本居中-->
                    <h4 class="mb-0">仓库管理系统</h4>     <!--无下边距-->
                    <p class="mb-0 fs-6">用户登录</p>      <!--无下边距 字体大小为6-->
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('auth.login') }}">     <!--提交到 auth.login 路由-->
                        <div class="mb-3">
                            <label for="username" class="form-label">用户名</label>
                            <input type="text" class="form-control" id="username" name="username" required placeholder="请输入用户名">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">密码</label>
                            <input type="text" class="form-control" id="password" name="password" required placeholder="请输入密码">
                        </div>
                        <div class="mb-3 form-check">       <!--form-check：Bootstrap 复选框容器-->
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <!--form-check-input：复选框输入框样式 type="checkbox"：复选框类型-->      
                            <label class="form-check-label" for="remember">记住我</label>      <!--关联到复选框id-->
                        </div>
                        <button type="submit" class="btn btn-primary w-100">登录</button>      <!--w-100：宽度 100%-->
                    </form>
                    <div class="mt-3 text-center">
                        <a href="{{ url_for('auth.register') }}" class="text-decoration-none">还没有账号？点击注册</a>      <!--text-decoration:none用于删除文本的装饰效果，比如删除下划线、删除线等-->
                    </div>
                </div>
            </div> 
        </div>
    </div>
{% endblock %}
