{% extends "base.html" %}
{% block title %}登录 - 仓库管理系统{% endblock %}

{% block content %}
    <style>
        /* 页面标题霓虹效果 */
        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #b24bf3, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            position: relative;
        }
        
        /* 表单卡片 - 渐变蓝紫边框 */
        .form-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 3px solid transparent;
            background-clip: padding-box;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.15),
                0 0 40px rgba(102, 126, 234, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.8);
            position: relative;
            padding: 2rem;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .form-card::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(135deg, #00d4ff, #667eea, #b24bf3);
            border-radius: 22px;
            z-index: -1;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 表单标签样式 */
        .form-label {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.6rem;
            font-size: 1rem;
            letter-spacing: 0.3px;
        }
        
        .form-label .text-danger {
            margin-left: 3px;
            font-size: 1.1rem;
        }
        
        /* 输入框组样式 */
        .input-group {
            position: relative;
        }
        
        .input-group-text {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px 0 0 12px;
            color: #ffffff;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        
        .input-group-text i {
            font-size: 1.1rem;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }
        
        .input-group:focus-within .input-group-text {
            background: linear-gradient(135deg, #00d4ff, #667eea);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
        
        .form-control, .form-select {
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-left: none;
            border-radius: 0 12px 12px 0;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            font-weight: 500;
            color: #1e293b;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.98);
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2), 0 0 25px rgba(0, 212, 255, 0.15);
            background: #ffffff;
            color: #0f172a;
        }
        
        .form-control::placeholder {
            color: #64748b;
            font-weight: 400;
        }
        
        /* 复选框样式 */
        .form-check-input {
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .form-check-input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
        }
        
        .form-check-input:checked {
            background-color: #667eea;
            border-color: #667eea;
        }
        
        .form-check-label {
            font-weight: 600;
            color: #1e293b;
        }
        
        /* 按钮样式 */
        .btn-login {
            background: linear-gradient(135deg, #00d4ff, #667eea, #b24bf3);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            padding: 0.85rem 2.2rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 25px rgba(0, 212, 255, 0.4), 0 0 30px rgba(178, 75, 243, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .btn-login i {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }
        
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-login:hover::before {
            left: 100%;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(0, 212, 255, 0.6), 0 0 50px rgba(178, 75, 243, 0.4);
            color: #ffffff;
        }
        
        /* 链接样式 - 与登录按钮一致 */
        .auth-link {
            background: linear-gradient(135deg, #00d4ff, #667eea, #b24bf3);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            padding: 0.85rem 2.2rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 25px rgba(0, 212, 255, 0.4), 0 0 30px rgba(178, 75, 243, 0.2);
            position: relative;
            overflow: hidden;
            display: inline-block;
            text-decoration: none;
        }
        
        .auth-link i {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }
        
        .auth-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }
        
        .auth-link:hover::before {
            left: 100%;
        }
        
        .auth-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(0, 212, 255, 0.6), 0 0 50px rgba(178, 75, 243, 0.4);
            color: #ffffff;
            text-decoration: none;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .form-card {
                padding: 1.25rem;
            }
            
            .page-title {
                font-size: 1.35rem;
            }
            
            .btn-login {
                padding: 0.6rem 1.25rem;
                font-size: 0.875rem;
            }
        }
    </style>

    <div class="row justify-content-center mt-10">
        <div class="col-md-6 col-lg-4">
            <div class="form-card">
                <div class="text-center mb-6">
                    <h2 class="page-title mb-2">用户登录</h2>
                </div>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-4">
                        <label for="username" class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa fa-user"></i>
                            </span>
                            <input type="text" class="form-control" id="username" name="username" required placeholder="请输入用户名">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fa fa-lock"></i>
                            </span>
                            <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码">
                        </div>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">记住我</label>
                    </div>
                    <button type="submit" class="btn btn-login w-100">
                        <i class="fa fa-sign-in mr-2"></i>登录
                    </button>
                </form>
                <div class="mt-4 text-center">
                    <a href="{{ url_for('auth.register') }}" class="auth-link">还没有账号？点击注册</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
