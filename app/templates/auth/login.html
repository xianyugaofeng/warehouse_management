{% extends "base.html" %}
{% block title %}登录 - 仓库管理系统{% endblock %}

{% block content %}
    <div class="row justify-content-center mt-10">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm rounded-xl overflow-hidden">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h4 class="mb-0 text-xl font-bold">仓库管理系统</h4>
                    <p class="mb-0 fs-6">用户登录</p>
                </div>
                <div class="card-body p-6">
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-4">
                            <label for="username" class="form-label">用户名</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-user text-gray-400"></i>
                                </span>
                                <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="username" name="username" required placeholder="请输入用户名">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">密码</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-lock text-gray-400"></i>
                                </span>
                                <input type="password" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="password" name="password" required placeholder="请输入密码">
                            </div>
                        </div>
                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input rounded border-gray-300 focus:ring-primary" id="remember" name="remember">
                            <label class="form-check-label" for="remember">记住我</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                            <i class="fa fa-sign-in mr-2"></i>登录
                        </button>
                    </form>
                    <div class="mt-4 text-center">
                        <a href="{{ url_for('auth.register') }}" class="text-decoration-none text-primary hover:underline transition-colors duration-300">还没有账号？点击注册</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <style>
        /* 自定义动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card {
            animation: fadeInUp 0.5s ease-out;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .input-group {
                font-size: 0.875rem;
            }
            
            .btn {
                font-size: 0.75rem;
                padding: 0.25rem 0.5rem;
            }
        }
    </style>
{% endblock %}
