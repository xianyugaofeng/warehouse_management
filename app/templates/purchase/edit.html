{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <h2 class="mt-4 mb-4">编辑采购单</h2>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('purchase.list') }}">采购单管理</a></li>
                    <li class="breadcrumb-item active" aria-current="page">编辑采购单</li>
                </ol>
            </nav>
            
            <form method="post" class="mb-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">采购单信息</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <label for="supplier_id" class="form-label">供应商<span class="text-danger">*</span></label>
                                <select name="supplier_id" id="supplier_id" class="form-select" required>
                                    <option value="">请选择供应商</option>
                                    {% for supplier in suppliers %}
                                    <option value="{{ supplier.id }}" {% if purchase_order.supplier_id == supplier.id %}selected{% endif %}>{{ supplier.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="expected_date" class="form-label">预计到货日期<span class="text-danger">*</span></label>
                                <input type="date" name="expected_date" id="expected_date" class="form-control" value="{{ purchase_order.expected_date.strftime('%Y-%m-%d') if purchase_order.expected_date else '' }}" required>
                            </div>
                            <div class="col-md-3">
                                <label for="allow_partial_receipt" class="form-label">允许部分收货</label>
                                <select name="allow_partial_receipt" id="allow_partial_receipt" class="form-select">
                                    <option value="false" {% if not purchase_order.allow_partial_receipt %}selected{% endif %}>否（必须全部收货）</option>
                                    <option value="true" {% if purchase_order.allow_partial_receipt %}selected{% endif %}>是（可以分批收货）</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="remark" class="form-label">备注</label>
                                <input type="text" name="remark" id="remark" class="form-control" value="{{ purchase_order.remark or '' }}">
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card mt-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">采购明细</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered">
                                <thead class="table-light">
                                    <tr>
                                        <th>商品</th>
                                        <th>数量</th>
                                        <th>单价</th>
                                        <th>小计</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for item in purchase_order.items %}
                                    <tr>
                                        <td>{{ item.product.name }} ({{ item.product.code }})</td>
                                        <td>{{ item.quantity }}</td>
                                        <td>{{ item.unit_price }}</td>
                                        <td>{{ item.subtotal }}</td>
                                        <td>
                                            <button type="button" class="btn btn-sm btn-danger" onclick="removeItem({{ item.id }})">删除</button>
                                        </td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <a href="{{ url_for('purchase.list') }}" class="btn btn-outline-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
