{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <h2 class="mt-4 mb-4">添加采购单</h2>
            
            <form method="post" class="mb-4">
                <div class="card">
                    <div class="card-header">
                        采购单信息
                    </div>
                    <div class="card-body">
                        <div class="form-row">
                            <div class="form-group col-md-3">
                                <label for="supplier_id">供应商</label>
                                <select name="supplier_id" id="supplier_id" class="form-control" required>
                                    <option value="">请选择供应商</option>
                                    {% for supplier in suppliers %}
                                    <option value="{{ supplier.id }}">{{ supplier.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-group col-md-3">
                                <label for="product_id">商品</label>
                                <select name="product_id" id="product_id" class="form-control" required>
                                    <option value="">请选择商品</option>
                                    {% for product in products %}
                                    <option value="{{ product.id }}">{{ product.name }} ({{ product.code }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-group col-md-2">
                                <label for="quantity">数量</label>
                                <input type="number" name="quantity" id="quantity" class="form-control" min="1" required>
                            </div>
                            <div class="form-group col-md-2">
                                <label for="unit_price">单价</label>
                                <input type="number" name="unit_price" id="unit_price" class="form-control" min="0" step="0.01" required>
                            </div>
                            <div class="form-group col-md-2">
                                <label for="expected_date">预计到货日期</label>
                                <input type="date" name="expected_date" id="expected_date" class="form-control" value="{{ now.strftime('%Y-%m-%d') }}" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-12">
                                <label for="remark">备注</label>
                                <input type="text" name="remark" id="remark" class="form-control">
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <a href="{{ url_for('purchase.list') }}" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
