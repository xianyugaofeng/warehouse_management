{% extends "base.html" %}
{% block title %}添加权限 - 仓库管理系统{% endblock %}

{% block content %}
<div class="row mb-6">
    <div class="col">
        <h2 class="text-2xl font-bold text-gray-800 flex items-center">
            <i class="fa fa-key mr-3 text-primary"></i>添加权限
        </h2>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('user.list') }}">用户管理</a></li>
                <li class="breadcrumb-item"><a href="{{ url_for('user.permission_list') }}">权限管理</a></li>
                <li class="breadcrumb-item active" aria-current="page">添加权限</li>
            </ol>
        </nav>
    </div>
</div>

<div class="card shadow-sm rounded-xl overflow-hidden">
    <div class="card-body p-6">
        <form method="POST" class="space-y-4">
            <div class="row g-4">
                <div class="col-md-6">
                    <label for="name" class="form-label">权限名称 <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                            <i class="fa fa-code text-gray-400"></i>
                        </span>
                        <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="name" name="name" required placeholder="请输入权限名称">
                    </div>
                    <div class="form-text mt-1 text-gray-600">权限名称应使用小写字母和下划线，如 product_manage</div>
                </div>
                <div class="col-md-6">
                    <label for="desc" class="form-label">权限描述 <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                            <i class="fa fa-file-text text-gray-400"></i>
                        </span>
                        <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="desc" name="desc" required placeholder="请输入权限描述">
                    </div>
                    <div class="form-text mt-1 text-gray-600">权限的中文描述，如 商品管理</div>
                </div>
            </div>
            <div class="pt-4 text-end">
                <a href="{{ url_for('user.permission_list') }}" class="btn btn-secondary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg mr-2">
                    <i class="fa fa-times mr-2"></i>取消
                </a>
                <button type="submit" class="btn btn-primary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                    <i class="fa fa-save mr-2"></i>保存
                </button>
            </div>
        </form>
    </div>
</div>
    
    <style>
        /* 自定义动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .card {
            animation: fadeInUp 0.5s ease-out;
        }
        
        h2 {
            animation: slideIn 0.4s ease-out;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .row.g-4 {
                flex-direction: column;
            }
            
            .col-md-6 {
                width: 100%;
            }
            
            .btn {
                font-size: 0.75rem;
                padding: 0.25rem 0.5rem;
            }
        }
    </style>
{% endblock %}
