{% extends "base.html" %}
{% block title %}编辑角色 - 仓库管理系统{% endblock %}
{% block content %}
    <style>
        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #b24bf3, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            position: relative;
        }
        
        .page-title-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            box-shadow: 
                0 0 25px rgba(240, 147, 251, 0.5),
                0 0 50px rgba(245, 87, 108, 0.3),
                inset 0 0 15px rgba(255, 255, 255, 0.2);
            position: relative;
        }
        
        .page-title-icon i {
            font-size: 1.5rem;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        .form-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            box-shadow: 
                0 10px 35px rgba(0, 0, 0, 0.1),
                0 0 40px rgba(102, 126, 234, 0.2);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .form-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00d4ff, #b24bf3, #ff6b9d, #00d4ff, #b24bf3);
            background-size: 400% 400%;
            border-radius: 22px;
            z-index: -1;
            animation: neonBorderGlow 6s ease infinite, breatheGlow 3s ease-in-out infinite;
            opacity: 0.7;
        }
        
        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        
        .input-group-text {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: #667eea;
            transition: all 0.3s ease;
        }
        
        .form-control {
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 0 12px 12px 0;
            padding: 0.75rem 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1), 0 0 20px rgba(102, 126, 234, 0.2);
        }
        
        .permission-box {
            background: rgba(102, 126, 234, 0.05);
            border: 2px solid rgba(102, 126, 234, 0.15);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .permission-box:hover {
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.1);
        }
        
        .form-check {
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .form-check:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        .form-check-input {
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .form-check-input:checked {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.4);
        }
        
        .form-check-label {
            color: #374151;
            font-weight: 500;
            margin-left: 0.5rem;
        }
        
        .btn-neon-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-neon-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .btn-neon-secondary {
            background: linear-gradient(135deg, #6c757d, #495057);
            border: none;
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.4);
        }
        
        .btn-neon-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(108, 117, 125, 0.6);
        }
        
        .btn-neon-outline {
            background: transparent;
            border: 2px solid rgba(102, 126, 234, 0.3);
            color: #667eea;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-neon-outline:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        @keyframes neonBorderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes breatheGlow {
            0%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.01);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .page-title {
                font-size: 1.35rem;
            }
            
            .page-title-icon {
                width: 40px;
                height: 40px;
                margin-right: 10px;
            }
            
            .page-title-icon i {
                font-size: 1.2rem;
            }
            
            .btn-neon-primary,
            .btn-neon-secondary,
            .btn-neon-outline {
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
            }
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4 page-header">
        <div class="d-flex align-items-center">
            <div class="page-title-icon"><i class="fa fa-shield"></i></div>
            <h2 class="page-title mb-0">编辑角色</h2>
        </div>
        <a href="{{ url_for('user.role_list') }}" class="btn btn-neon-outline">
            <i class="fa fa-arrow-left mr-2"></i>返回列表
        </a>
    </div>

    <div class="form-card">
        <div class="card-body p-4">
            <form method="post">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label for="name" class="form-label">角色名称 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa fa-tag"></i></span>
                            <input type="text" class="form-control" id="name" name="name" value="{{ role.name }}" required placeholder="请输入角色名称">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="desc" class="form-label">描述</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa fa-info-circle"></i></span>
                            <input type="text" class="form-control" id="desc" name="desc" value="{{ role.desc }}" placeholder="请输入角色描述">
                        </div>
                    </div>
                </div>
                
                <div class="mt-4">
                    <label class="form-label">权限</label>
                    <div class="permission-box">
                        <div class="row">
                            {% for perm_name, perm_desc in permissions.items() %}
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="perm{{ loop.index }}" name="permissions" value="{{ perm_name }}" {% if perm_name in role_perms %}checked{% endif %}>
                                    <label class="form-check-label" for="perm{{ loop.index }}">{{ perm_desc }}</label>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
                
                <div class="pt-4">
                    <button type="submit" class="btn btn-neon-primary">
                        <i class="fa fa-save mr-2"></i>保存
                    </button>
                    <a href="{{ url_for('user.role_list') }}" class="btn btn-neon-secondary ml-2">
                        <i class="fa fa-times mr-2"></i>取消
                    </a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
