{% extends "base.html" %}
{% block title %}权限管理 - 仓库管理系统{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2>权限管理</h2>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('user.list') }}">用户管理</a></li>
                <li class="breadcrumb-item active" aria-current="page">权限管理</li>
            </ol>
        </nav>
    </div>
    <div class="col text-end">
        <a href="{{ url_for('user.permission_add') }}" class="btn btn-primary">
            <i class="fa fa-plus"></i>添加权限
        </a>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>权限名称</th>
                        <th>权限描述</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for permission in permissions %}
                        <tr>
                            <td>{{ permission.name }}</td>
                            <td>{{ permission.desc }}</td>
                            <td>
                                <a href="{{ url_for('user.permission_edit', perm_id=permission.id) }}" class="btn btn-sm btn-outline-primary">
                                    <i class="fa fa-edit"></i>编辑
                                </a>
                                <a href="{{ url_for('user.permission_delete', perm_id=permission.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('确认删除?')">
                                    <i class="fa fa-trash"></i>删除
                                </a>
                            </td>
                        </tr>
                    {% else %}
                        <tr>
                            <td colspan="3" class="text-center text-muted">暂无权限数据</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
