{% extends "base.html" %}
{% block title %}添加角色 - 仓库管理系统{% endblock %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800 flex items-center">
            <i class="fa fa-shield-plus mr-3 text-primary"></i>添加角色
        </h2>
        <a href="{{ url_for('user.role_list') }}" class="btn btn-outline-secondary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
            <i class="fa fa-arrow-left mr-2"></i>返回列表
        </a>
    </div>

    <div class="card shadow-sm rounded-xl overflow-hidden">
        <div class="card-body p-6">
            <form method="post" class="space-y-4">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label for="name" class="form-label">角色名称 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-tag text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="name" name="name" required placeholder="请输入角色名称">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="desc" class="form-label">描述</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-info-circle text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="desc" name="desc" placeholder="请输入角色描述">
                        </div>
                    </div>
                </div>
                
                <div class="mt-4">
                    <label class="form-label font-semibold">权限</label>
                    <div class="border border-gray-200 rounded-lg p-4 bg-gray-50">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {% for perm_name, perm_desc in permissions.items() %}
                            <div class="form-check">
                                <input class="form-check-input rounded border-gray-300 text-primary focus:ring-primary transition-all duration-300" type="checkbox" id="perm{{ loop.index }}" name="permissions" value="{{ perm_name }}">
                                <label class="form-check-label text-gray-700 ml-2" for="perm{{ loop.index }}">{{ perm_desc }}</label>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
                
                <div class="pt-4">
                    <button type="submit" class="btn btn-primary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                        <i class="fa fa-save mr-2"></i>保存
                    </button>
                    <a href="{{ url_for('user.role_list') }}" class="btn btn-secondary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg ml-2">
                        <i class="fa fa-times mr-2"></i>取消
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <style>
        /* 自定义动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .card {
            animation: fadeInUp 0.5s ease-out;
        }
        
        h2 {
            animation: slideIn 0.4s ease-out;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .row.g-4 {
                flex-direction: column;
            }
            
            .col-md-6 {
                width: 100%;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
            
            .btn {
                font-size: 0.75rem;
                padding: 0.25rem 0.5rem;
            }
        }
    </style>
{% endblock %}
