{% extends "base.html" %}
{% block title %}添加用户 - 仓库管理系统{% endblock %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800 flex items-center">
            <i class="fa fa-user-plus mr-3 text-primary"></i>添加用户
        </h2>
        <a href="{{ url_for('user.list') }}" class="btn btn-outline-secondary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
            <i class="fa fa-arrow-left mr-2"></i>返回列表
        </a>
    </div>

    <div class="card shadow-sm rounded-xl overflow-hidden">
        <div class="card-body p-6">
            <form method="post" class="space-y-4">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-user text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="username" name="username" required placeholder="请输入用户名">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="real_name" class="form-label">真实姓名</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-id-card text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="real_name" name="real_name" placeholder="请输入真实姓名">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="password" class="form-label">密码 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-lock text-gray-400"></i>
                            </span>
                            <input type="password" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="password" name="password" required placeholder="请输入密码">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="phone" class="form-label">手机号</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-phone text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="phone" name="phone" placeholder="请输入手机号">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">邮箱</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-envelope text-gray-400"></i>
                            </span>
                            <input type="email" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="email" name="email" placeholder="请输入邮箱">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="role" class="form-label">角色 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-shield text-gray-400"></i>
                            </span>
                            <select class="form-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="role" name="role_id" required>
                                <option value="">请选择角色</option>
                                {% for role in roles %}
                                <option value="{{ role.id }}">{{ role.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
                <div class="pt-4">
                    <button type="submit" class="btn btn-primary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                        <i class="fa fa-save mr-2"></i>保存
                    </button>
                    <a href="{{ url_for('user.list') }}" class="btn btn-secondary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg ml-2">
                        <i class="fa fa-times mr-2"></i>取消
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <style>
        /* 自定义动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .card {
            animation: fadeInUp 0.5s ease-out;
        }
        
        h2 {
            animation: slideIn 0.4s ease-out;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .row.g-4 {
                flex-direction: column;
            }
            
            .col-md-6 {
                width: 100%;
            }
            
            .btn {
                font-size: 0.75rem;
                padding: 0.25rem 0.5rem;
            }
        }
    </style>
{% endblock %}
