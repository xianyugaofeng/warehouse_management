{% extends "base.html" %}
{% block title %}{{ '编辑客户' if customer.id else '添加客户' }} - 仓库管理系统{% endblock %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-6">    
        <h2 class="text-2xl font-bold text-gray-800 flex items-center">
            <i class="fa fa-users mr-3 text-primary"></i>{{ '编辑客户' if customer.id else '添加客户' }}
        </h2>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('customer.list') }}">客户管理</a></li>
                <li class="breadcrumb-item active" aria-current="page">{{ '编辑客户' if customer.id else '添加客户' }}</li>
            </ol>
        </nav>
    </div>

    <div class="card mb-6 shadow-sm rounded-xl overflow-hidden">
        <div class="card-body p-6">
            <form action="{{ url_for('customer.edit', id=customer.id or 0) }}" method="POST">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">客户名称 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-users text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="name" name="name" value="{{ customer.name or '' }}" required placeholder="请输入客户名称">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="contact_person" class="form-label">联系人</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-user text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="contact_person" name="contact_person" value="{{ customer.contact_person or '' }}" placeholder="请输入联系人姓名">
                        </div>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="phone" class="form-label">联系电话</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-phone text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="phone" name="phone" value="{{ customer.phone or '' }}" placeholder="请输入联系电话">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">邮箱</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-envelope text-gray-400"></i>
                            </span>
                            <input type="email" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="email" name="email" value="{{ customer.email or '' }}" placeholder="请输入邮箱地址">
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="address" class="form-label">地址</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                            <i class="fa fa-map-marker text-gray-400"></i>
                        </span>
                        <textarea class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="address" name="address" rows="3" placeholder="请输入地址">{{ customer.address or '' }}</textarea>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300">
                        <i class="fa fa-save mr-2"></i>保存
                    </button>
                    <a href="{{ url_for('customer.list') }}" class="btn btn-outline-secondary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300">
                        <i class="fa fa-times mr-2"></i>取消
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <style>
        /* 自定义动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .card {
            animation: fadeInUp 0.5s ease-out;
        }
        
        h2 {
            animation: slideIn 0.4s ease-out;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .input-group {
                font-size: 0.875rem;
            }
            
            .btn {
                font-size: 0.75rem;
                padding: 0.25rem 0.5rem;
            }
            
            .flex.justify-between {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
{% endblock %}
