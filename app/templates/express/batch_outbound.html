{% extends "base.html" %}
{% block title %}批量出库 - 快递站管理{% endblock %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>批量出库</h2>
        <a href="{{ url_for('express.dashboard') }}" class="btn btn-secondary">
            <i class="fa fa-arrow-left"></i> 返回
        </a>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form id="batchForm" class="row g-3">
                <div class="col-md-6">
                    <label for="location_id" class="form-label">库位</label>
                    <select class="form-select" id="location_id" name="location_id" required>
                        <option value="">请选择库位</option>
                        {% for location in locations %}
                        <option value="{{ location.id }}">{{ location.code }} - {{ location.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="remark" class="form-label">备注</label>
                    <input type="text" class="form-control" id="remark" name="remark">
                </div>
                <div class="col-12">
                    <label for="waybill_nos" class="form-label">运单号列表（每行一个运单号）</label>
                    <textarea class="form-control" id="waybill_nos" name="waybill_nos" rows="10" required placeholder="请输入运单号，每行一个"></textarea>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa fa-truck"></i> 批量出库
                    </button>
                    <button type="reset" class="btn btn-secondary">
                        <i class="fa fa-undo"></i> 重置
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 出库结果 -->
    <div class="card" id="resultCard" style="display: none;">
        <div class="card-body">
            <h5 class="card-header bg-primary text-white mb-3">出库结果</h5>
            <div id="outboundResult" class="alert" style="display: none;"></div>
            <div id="outboundInfo" style="display: none;">
                <table class="table table-bordered">
                    <tr>
                        <th width="50%">处理状态</th>
                        <td id="resultStatus"></td>
                    </tr>
                    <tr>
                        <th>成功数量</th>
                        <td id="resultSuccessCount"></td>
                    </tr>
                    <tr>
                        <th>失败数量</th>
                        <td id="resultFailCount"></td>
                    </tr>
                </table>
            </div>
            <div id="failMessages" style="display: none;">
                <h6>失败详情：</h6>
                <ul id="failList"></ul>
            </div>
        </div>
    </div>

<script>
document.getElementById('batchForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const location_id = document.getElementById('location_id').value;
    const remark = document.getElementById('remark').value;
    const waybill_nos_text = document.getElementById('waybill_nos').value;
    
    if (!location_id || !waybill_nos_text.trim()) {
        alert('请选择库位并输入运单号');
        return;
    }
    
    // 解析运单号列表
    const waybill_nos = waybill_nos_text.trim().split('\n').filter(no => no.trim() !== '');
    
    if (waybill_nos.length === 0) {
        alert('请输入至少一个运单号');
        return;
    }
    
    fetch('/express/batch/outbound', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            waybill_nos: waybill_nos,
            location_id: parseInt(location_id),
            remark: remark
        })
    })
    .then(response => response.json())
    .then(data => {
        const resultDiv = document.getElementById('outboundResult');
        const outboundInfoDiv = document.getElementById('outboundInfo');
        const failMessagesDiv = document.getElementById('failMessages');
        const resultCard = document.getElementById('resultCard');
        
        resultCard.style.display = 'block';
        
        if (data.success) {
            resultDiv.className = 'alert alert-success';
            resultDiv.textContent = data.message;
            resultDiv.style.display = 'block';
            
            // 显示出库信息
            outboundInfoDiv.style.display = 'block';
            document.getElementById('resultStatus').textContent = '成功';
            
            // 从消息中提取成功和失败数量
            const successMatch = data.message.match(/成功(\d+)件/);
            const failMatch = data.message.match(/失败(\d+)件/);
            
            document.getElementById('resultSuccessCount').textContent = successMatch ? successMatch[1] + '件' : '0件';
            document.getElementById('resultFailCount').textContent = failMatch ? failMatch[1] + '件' : '0件';
            
            // 显示失败详情
            if (data.fail_messages && data.fail_messages.length > 0) {
                failMessagesDiv.style.display = 'block';
                const failList = document.getElementById('failList');
                failList.innerHTML = '';
                
                data.fail_messages.forEach(message => {
                    const li = document.createElement('li');
                    li.textContent = message;
                    failList.appendChild(li);
                });
            } else {
                failMessagesDiv.style.display = 'none';
            }
        } else {
            resultDiv.className = 'alert alert-danger';
            resultDiv.textContent = data.message;
            resultDiv.style.display = 'block';
            outboundInfoDiv.style.display = 'none';
            failMessagesDiv.style.display = 'none';
        }
    })
    .catch(error => {
        console.error('Error:', error);
        const resultDiv = document.getElementById('outboundResult');
        const resultCard = document.getElementById('resultCard');
        resultCard.style.display = 'block';
        resultDiv.className = 'alert alert-danger';
        resultDiv.textContent = '批量出库失败，请重试';
        resultDiv.style.display = 'block';
        document.getElementById('outboundInfo').style.display = 'none';
        document.getElementById('failMessages').style.display = 'none';
    });
});
</script>
{% endblock %}
