{% extends "base.html" %}
{% block title %}添加出库单 - 仓库管理系统{% endblock %}

{% block js %}          <!--JavaScript脚本 用于处理出库单表单的动态交互和验证-->
    <!--动态添加入库明细行-->
    <!--删除指定的入库明细行-->
    <!--在表单提交时进行验证,确保至少有一条明细,且所有数量都大于0-->
    <script>
        // 在DOM结构加载完成后立即执行代码的方法,不必等待图片,视频等资源完全加载
        $(document).ready(function() {
            let rowIndex = 0;
            //动态添加明细行
            $('#addItemBtn').click(function() {
                rowIndex++;
                const newRow = `
                    <tr id="itemRow${rowIndex}">
                        <td>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-shopping-bag text-gray-400"></i>
                                </span>
                                <select class="form-select product-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="product_id[]" required>
                                    <option value="">请选择商品</option>
                                    {% for product in products %}
                                        <option value="{{ product.id }}">
                                            {{ product.name }} ({{ product.code }})
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-map-marker text-gray-400"></i>
                                </span>
                                <select class="form-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="location_id[]" required>
                                    <option value="">请选择库位</option>
                                    {% for location in locations %}
                                        <option value="{{ location.id }}">
                                            {{ location.code }} - {{ location.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-barcode text-gray-400"></i>
                                </span>
                                <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="batch_no[]" placeholder="批次号(选填)">
                            </div>
                        </td>
                        <td>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-cubes text-gray-400"></i>
                                </span>
                                <input type="number" class="form-control quantity-input rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="quantity[]" min="1" required placeholder="数量">
                            </div>
                        </td>
                        <td>
                            <button type="button" class="btn btn-sm btn-danger shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg remove-item" data-row="${rowIndex}">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                $("#itemTableBody").append(newRow);
            });
            //删除明细行
            $(document).on("click", ".remove-item", function() {
                const rowId = $(this).data("row");
                $(`#itemRow${rowId}`).remove();
            });
            //表单提交验证
            $("form").submit(function() {
                const hasItems = $("#itemTableBody tr").length > 0
                if (!hasItems) {
                    alert('请至少添加一条出库明细!');
                    return false;
                }
                let isValid = true;
                //验证数量输入
                $(".quantity-input").each(function() {
                    if ($(this).val() <= 0 || !$(this).val()) {
                        alert('数量必须大于0');
                        isValid = false;
                        return false;
                    }
                });
                //验证领用人
                if (!$("#receiver").val()) {      //检查ID为receiver的元素输入框的值是否为空
                    alert('请填写领用人');
                    isValid = false;
                }
                return isValid;         //如果所有验证都通过，则允许表单提交
            });
        });
    </script>
{% endblock %}

{% block content %}
    <div class="row mb-6">
        <div class="col">
            <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                <i class="fa fa-arrow-up mr-3 text-primary"></i>添加出库单
            </h2>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('outbound.list') }}">出库管理</a></li>
                    <li class="breadcrumb-item active" aria-current="page">添加出库单</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="card shadow-sm rounded-xl overflow-hidden">
        <div class="card-body p-6">
            <form method="POST" action="{{ url_for('outbound.add') }}">
                <!--出库单基本信息-->
                <div class="row g-4 mb-6">          <!--Bootstrap栅格行 下边距1.5em-->

                    <div class="col-md-6">
                        <label for="customer_id" class="form-label">客户<span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-users text-gray-400"></i>
                            </span>
                            <select class="form-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="customer_id" name="customer_id" required>
                                <option value="">请选择客户</option>
                                {% for customer in customers %}
                                    <option value="{{ customer.id }}">
                                        {{ customer.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="receive_phone" class="form-label">联系电话</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-phone text-gray-400"></i>
                            </span>
                            <input type="tel" id="receive_phone" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="receive_phone" placeholder="请输入联系电话(选填)">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="outbound_date" class="form-label">出库日期<span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-calendar text-gray-400"></i>
                            </span>
                            <input type="date" id="outbound_date" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="outbound_date" value="{{ now.strftime('%Y-%m-%d') if now else '' }}" required>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="remark" class="form-label">备注</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-comment text-gray-400"></i>
                            </span>
                            <input type="text" id="remark" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="remark" placeholder="输入备注信息(选填)">
                        </div>
                    </div>
                </div>

                <!--出库明细-->
                <div class="mb-6">      <!--下边距为1.5rem 容器包裹整个入库明细区域-->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <!--子元素水平排列 两端对齐 垂直居中-->
                        <h5 class="text-lg font-semibold text-gray-800">出库明细</h5>
                        <button type="button" id="addItemBtn" class="btn btn-sm btn-outline-primary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                            <i class="fa fa-plus mr-1"></i>添加明细      <!--已为#addItemBtn按钮绑定click事件-->
                        </button>           <!--绑定事件:为表格添加明细行-->
                    </div>
                    <div class="table-responsive">
                        <table class="table table-bordered">
                            <thead class="bg-gray-50">
                                <tr class="text-gray-700 border-b-2 border-gray-300">
                                    <th width="25%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">商品</th>
                                    <th width="20%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">库位</th>
                                    <th width="20%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">批次号</th>
                                    <th width="15%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">数量</th>
                                    <th width="20%" class="py-3 px-4 font-semibold text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="itemTableBody">          <!--用于click事件动态添加表格明细行-->
                                <!--初始空行-->
                                <tr id="itemRow0">
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-shopping-bag text-gray-400"></i>
                                            </span>
                                            <select class="form-select product-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="product_id[]" required>
                                                <option value="">请输入商品</option>
                                                {% for product in products %}
                                                    <option value="{{ product.id }}">
                                                        {{ product.name }} ({{ product.code }})
                                                    </option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-map-marker text-gray-400"></i>
                                            </span>
                                            <select class="form-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="location_id[]" required>
                                                <option value="">请输入库位</option>
                                                {% for location in locations %}
                                                    <option value="{{ location.id }}">
                                                        {{ location.code }} - {{ location.name }}
                                                    </option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-barcode text-gray-400"></i>
                                            </span>
                                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="batch_no[]" placeholder="批次号(选填)">
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-cubes text-gray-400"></i>
                                            </span>
                                            <input type="number" class="form-control quantity-input rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="quantity[]" min="1" required placeholder="数量">
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-b border-gray-200 text-center">
                                        <button type="button" class="btn btn-sm btn-danger shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg remove-item" data-row="0" disabled>
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!--提交按钮-->
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                        <i class="fa fa-save mr-2"></i>提交出库单
                    </button>
                    <a href="{{ url_for('outbound.list') }}" class="btn btn-outline-secondary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                        <i class="fa fa-times mr-2"></i>取消
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <style>
        /* 自定义动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .card {
            animation: fadeInUp 0.5s ease-out;
        }
        
        h2 {
            animation: slideIn 0.4s ease-out;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .row.g-4 {
                flex-direction: column;
            }
            
            .col-md-6 {
                width: 100%;
            }
            
            .table-responsive {
                font-size: 0.875rem;
            }
            
            .table th,
            .table td {
                padding: 0.75rem;
            }
            
            .btn {
                font-size: 0.75rem;
                padding: 0.25rem 0.5rem;
            }
        }
    </style>
{% endblock %}
