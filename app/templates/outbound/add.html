{% extends "base.html" %}
{% block title %}添加出库单 - 仓库管理系统{% endblock %}

{% block js %}
    <script>
        $(document).ready(function() {
            let rowIndex = 0;
            $('#addItemBtn').click(function() {
                rowIndex++;
                const newRow = `
                    <tr id="itemRow${rowIndex}">
                        <td>
                            <div class="input-group form-input-group">
                                <span class="input-group-text">
                                    <i class="fa fa-shopping-bag"></i>
                                </span>
                                <select class="form-select product-select" name="product_id[]" required>
                                    <option value="">请选择商品</option>
                                    {% for product in products %}
                                        <option value="{{ product.id }}">
                                            {{ product.name }} ({{ product.code }})
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td>
                            <div class="input-group form-input-group">
                                <span class="input-group-text">
                                    <i class="fa fa-map-marker"></i>
                                </span>
                                <select class="form-select" name="location_id[]" required>
                                    <option value="">请选择库位</option>
                                    {% for location in locations %}
                                        <option value="{{ location.id }}">
                                            {{ location.code }} - {{ location.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td>
                            <div class="input-group form-input-group">
                                <span class="input-group-text">
                                    <i class="fa fa-barcode"></i>
                                </span>
                                <input type="text" class="form-control" name="batch_no[]" placeholder="批次号(选填)">
                            </div>
                        </td>
                        <td>
                            <div class="input-group form-input-group">
                                <span class="input-group-text">
                                    <i class="fa fa-cubes"></i>
                                </span>
                                <input type="number" class="form-control quantity-input" name="quantity[]" min="1" required placeholder="数量">
                            </div>
                        </td>
                        <td>
                            <button type="button" class="btn btn-remove remove-item" data-row="${rowIndex}">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                $("#itemTableBody").append(newRow);
            });
            $(document).on("click", ".remove-item", function() {
                const rowId = $(this).data("row");
                $(`#itemRow${rowId}`).remove();
            });
            $("form").submit(function() {
                const hasItems = $("#itemTableBody tr").length > 0
                if (!hasItems) {
                    alert('请至少添加一条出库明细!');
                    return false;
                }
                let isValid = true;
                $(".quantity-input").each(function() {
                    if ($(this).val() <= 0 || !$(this).val()) {
                        alert('数量必须大于0');
                        isValid = false;
                        return false;
                    }
                });
                if (!$("#customer_id").val()) {
                    alert('请选择客户');
                    isValid = false;
                }
                return isValid;
            });
        });
    </script>
{% endblock %}

{% block content %}
    <style>
        /* 页面标题霓虹效果 */
        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #b24bf3, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            position: relative;
        }
        
        .page-title-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff, #667eea);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            box-shadow: 
                0 0 25px rgba(0, 212, 255, 0.5),
                0 0 50px rgba(102, 126, 234, 0.3),
                inset 0 0 15px rgba(255, 255, 255, 0.2);
            position: relative;
        }
        
        .page-title-icon i {
            font-size: 1.5rem;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        /* 面包屑导航样式 */
        .breadcrumb {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 0.5rem 1.25rem;
            border: 1px solid rgba(102, 126, 234, 0.2);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
        }
        
        .breadcrumb-item a {
            color: #667eea;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .breadcrumb-item a:hover {
            color: #b24bf3;
            text-shadow: 0 0 8px rgba(178, 75, 243, 0.5);
        }
        
        .breadcrumb-item.active {
            color: #b24bf3;
            font-weight: 600;
        }
        
        /* 表单卡片 - 渐变蓝紫边框 */
        .form-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 3px solid transparent;
            background-clip: padding-box;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.15),
                0 0 40px rgba(102, 126, 234, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.8);
            position: relative;
            padding: 2rem;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .form-card::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(135deg, #00d4ff, #667eea, #b24bf3);
            border-radius: 22px;
            z-index: -1;
        }
        
        /* 输入框组样式 */
        .form-input-group .input-group-text {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px 0 0 12px;
            color: #ffffff;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        
        .form-input-group .input-group-text i {
            font-size: 1.1rem;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }
        
        .form-input-group:focus-within .input-group-text {
            background: linear-gradient(135deg, #00d4ff, #667eea);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
        
        .form-input-group .form-control,
        .form-input-group .form-select {
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-left: none;
            border-radius: 0 12px 12px 0;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            font-weight: 500;
            color: #1e293b;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.95);
        }
        
        .form-input-group .form-control:focus,
        .form-input-group .form-select:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2), 0 0 25px rgba(0, 212, 255, 0.15);
            background: #ffffff;
            color: #0f172a;
        }
        
        /* 表单标签样式 */
        .form-label {
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.6rem;
            font-size: 1rem;
            letter-spacing: 0.3px;
        }
        
        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            border-radius: 12px;
        }
        
        .data-table thead {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }
        
        .data-table th {
            color: #ffffff;
            padding: 1rem 1.25rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        .data-table td {
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid rgba(102, 126, 234, 0.15);
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .data-table tbody tr {
            transition: all 0.3s ease;
        }
        
        .data-table tbody tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        /* 按钮样式 */
        .btn-save {
            background: linear-gradient(135deg, #00d4ff, #667eea, #b24bf3);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            padding: 0.85rem 2.2rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 25px rgba(0, 212, 255, 0.4), 0 0 30px rgba(178, 75, 243, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .btn-save i {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }
        
        .btn-save::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-save:hover::before {
            left: 100%;
        }
        
        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(0, 212, 255, 0.6), 0 0 50px rgba(178, 75, 243, 0.4);
            color: #ffffff;
        }
        
        .btn-cancel {
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #667eea;
            border-radius: 12px;
            color: #667eea;
            padding: 0.7rem 2.2rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        
        .btn-cancel i {
            text-shadow: none;
        }
        
        .btn-cancel:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-cancel:hover i {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }
        
        .btn-add-item {
            background: linear-gradient(135deg, #10b981, #3b82f6);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            padding: 0.5rem 1.25rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.3);
        }
        
        .btn-add-item:hover {
            background: linear-gradient(135deg, #3b82f6, #10b981);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.5);
            color: #ffffff;
        }
        
        .btn-remove {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            padding: 0.45rem 0.9rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(255, 107, 107, 0.3);
        }
        
        .btn-remove:hover {
            background: linear-gradient(135deg, #ee5a6f, #ff6b6b);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.5);
            color: #ffffff;
        }
        
        /* 分隔线 */
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.3), transparent);
            margin: 1.5rem 0;
        }
        
        /* 卡片标题 */
        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1rem;
        }
        
        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .form-card {
                padding: 1.25rem;
            }
            
            .page-title {
                font-size: 1.35rem;
            }
            
            .page-title-icon {
                width: 40px;
                height: 40px;
                margin-right: 10px;
            }
            
            .page-title-icon i {
                font-size: 1.2rem;
            }
            
            .breadcrumb {
                display: none;
            }
            
            .data-table th,
            .data-table td {
                padding: 0.75rem;
                font-size: 0.875rem;
            }
            
            .btn-save,
            .btn-cancel {
                padding: 0.6rem 1.25rem;
                font-size: 0.875rem;
            }
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <div class="page-title-icon">
                <i class="fa fa-arrow-up"></i>
            </div>
            <h2 class="page-title mb-0">添加出库单</h2>
        </div>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="{{ url_for('outbound.list') }}">出库管理</a></li>
                <li class="breadcrumb-item active" aria-current="page">添加出库单</li>
            </ol>
        </nav>
    </div>

    <div class="form-card">
        <form method="POST" action="{{ url_for('outbound.add') }}">
            <!--出库单基本信息-->
            <div class="row g-4 mb-6">
                <div class="col-md-6">
                    <label for="outbound_type" class="form-label">出库类型<span class="text-danger">*</span></label>
                    <div class="input-group form-input-group">
                        <span class="input-group-text">
                            <i class="fa fa-tags"></i>
                        </span>
                        <select class="form-select" id="outbound_type" name="outbound_type" required>
                            <option value="delivery">发货出库</option>
                            <option value="return">退购出库</option>
                            <option value="scrap">报废出库</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="customer_id" class="form-label">客户<span class="text-danger">*</span></label>
                    <div class="input-group form-input-group">
                        <span class="input-group-text">
                            <i class="fa fa-users"></i>
                        </span>
                        <select class="form-select" id="customer_id" name="customer_id" required>
                            <option value="">请选择客户</option>
                            {% for customer in customers %}
                                <option value="{{ customer.id }}">
                                    {{ customer.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="receive_phone" class="form-label">联系电话</label>
                    <div class="input-group form-input-group">
                        <span class="input-group-text">
                            <i class="fa fa-phone"></i>
                        </span>
                        <input type="tel" id="receive_phone" class="form-control" name="receive_phone" placeholder="请输入联系电话(选填)">
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="outbound_date" class="form-label">出库日期<span class="text-danger">*</span></label>
                    <div class="input-group form-input-group">
                        <span class="input-group-text">
                            <i class="fa fa-calendar"></i>
                        </span>
                        <input type="date" id="outbound_date" class="form-control" name="outbound_date" value="{{ now.strftime('%Y-%m-%d') if now else '' }}" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="remark" class="form-label">备注</label>
                    <div class="input-group form-input-group">
                        <span class="input-group-text">
                            <i class="fa fa-comment"></i>
                        </span>
                        <input type="text" id="remark" class="form-control" name="remark" placeholder="输入备注信息(选填)">
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <!--出库明细-->
            <div class="mb-6">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="card-title">出库明细</h5>
                    <button type="button" id="addItemBtn" class="btn btn-add-item">
                        <i class="fa fa-plus mr-1"></i>添加明细
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table data-table">
                        <thead>
                            <tr>
                                <th width="25%" class="text-center">商品</th>
                                <th width="20%" class="text-center">库位</th>
                                <th width="20%" class="text-center">批次号</th>
                                <th width="15%" class="text-center">数量</th>
                                <th width="20%" class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="itemTableBody">
                            <tr id="itemRow0">
                                <td>
                                    <div class="input-group form-input-group">
                                        <span class="input-group-text">
                                            <i class="fa fa-shopping-bag"></i>
                                        </span>
                                        <select class="form-select product-select" name="product_id[]" required>
                                            <option value="">请选择商品</option>
                                            {% for product in products %}
                                                <option value="{{ product.id }}">
                                                    {{ product.name }} ({{ product.code }})
                                                </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </td>
                                <td>
                                    <div class="input-group form-input-group">
                                        <span class="input-group-text">
                                            <i class="fa fa-map-marker"></i>
                                        </span>
                                        <select class="form-select" name="location_id[]" required>
                                            <option value="">请选择库位</option>
                                            {% for location in locations %}
                                                <option value="{{ location.id }}">
                                                    {{ location.code }} - {{ location.name }}
                                                </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </td>
                                <td>
                                    <div class="input-group form-input-group">
                                        <span class="input-group-text">
                                            <i class="fa fa-barcode"></i>
                                        </span>
                                        <input type="text" class="form-control" name="batch_no[]" placeholder="批次号(选填)">
                                    </div>
                                </td>
                                <td>
                                    <div class="input-group form-input-group">
                                        <span class="input-group-text">
                                            <i class="fa fa-cubes"></i>
                                        </span>
                                        <input type="number" class="form-control quantity-input" name="quantity[]" min="1" required placeholder="数量">
                                    </div>
                                </td>
                                <td class="text-center">
                                    <button type="button" class="btn btn-remove remove-item" data-row="0">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!--提交按钮-->
            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-save">
                    <i class="fa fa-save mr-2"></i>提交出库单
                </button>
                <a href="{{ url_for('outbound.list') }}" class="btn btn-cancel">
                    <i class="fa fa-times mr-2"></i>取消
                </a>
            </div>
        </form>
    </div>
{% endblock %}
