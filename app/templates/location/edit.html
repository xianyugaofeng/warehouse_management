{% extends "base.html" %}
{% block title %}编辑库位 - 仓库管理系统{% endblock %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800 flex items-center">
            <i class="fa fa-map-marker mr-3 text-primary"></i>编辑库位
        </h2>
        <a href="{{ url_for('location.list') }}" class="btn btn-outline-secondary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
            <i class="fa fa-arrow-left mr-2"></i>返回列表
        </a>
    </div>

    <div class="card shadow-sm rounded-xl overflow-hidden">
        <div class="card-body p-6">
            <form method="post" class="space-y-4">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label for="code" class="form-label">库位编码</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-barcode text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="code" name="code" value="{{ location.code }}" required placeholder="请输入库位编码">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="name" class="form-label">库位名称</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-map-marker text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="name" name="name" value="{{ location.name }}" required placeholder="请输入库位名称">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="area" class="form-label">所属区域</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-building text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="area" name="area" value="{{ location.area }}" placeholder="请输入所属区域">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="status" class="form-label">状态</label>
                        <div class="flex space-x-4">
                            <div class="form-check">
                                <input class="form-check-input rounded border-gray-300 focus:ring-primary" type="radio" id="status1" name="status" value="1" {% if location.status %}checked{% endif %}>
                                <label class="form-check-label" for="status1">启用</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input rounded border-gray-300 focus:ring-primary" type="radio" id="status0" name="status" value="0" {% if not location.status %}checked{% endif %}>
                                <label class="form-check-label" for="status0">禁用</label>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <label for="remark" class="form-label">备注</label>
                        <textarea class="form-control rounded-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="remark" name="remark" rows="3" placeholder="请输入备注信息">{{ location.remark }}</textarea>
                    </div>
                </div>
                <div class="pt-4">
                    <button type="submit" class="btn btn-primary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                        <i class="fa fa-save mr-2"></i>保存
                    </button>
                    <a href="{{ url_for('location.list') }}" class="btn btn-secondary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg ml-2">
                        <i class="fa fa-times mr-2"></i>取消
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <style>
        /* 自定义动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .card {
            animation: fadeInUp 0.5s ease-out;
        }
        
        h2 {
            animation: slideIn 0.4s ease-out;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .row.g-4 {
                flex-direction: column;
            }
            
            .col-md-6,
            .col-md-12 {
                width: 100%;
            }
            
            .btn {
                font-size: 0.75rem;
                padding: 0.25rem 0.5rem;
            }
        }
    </style>
{% endblock %}
