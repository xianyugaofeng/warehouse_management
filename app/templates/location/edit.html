{% extends "base.html" %}
{% block title %}编辑库位{% endblock %}
{% block content %}
    <h2>编辑库位</h2>
    <form method="post">
        <div class="form-group mb-3">
            <label for="code">库位编码</label>
            <input type="text" class="form-control" id="code" name="code" value="{{ location.code }}" required>
        </div>
        <div class="form-group mb-3">
            <label for="name">库位名称</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ location.name }}" required>
        </div>
        <div class="form-group mb-3">
            <label for="area">所属区域</label>
            <input type="text" class="form-control" id="area" name="area" value="{{ location.area }}">
        </div>
        <div class="form-group mb-3">
            <label for="status">状态</label>
            <div class="form-check">
                <input class="form-check-input" type="radio" id="status1" name="status" value="1" {% if location.status %}checked{% endif %}>
                <label class="form-check-label" for="status1">启用</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" id="status0" name="status" value="0" {% if not location.status %}checked{% endif %}>
                <label class="form-check-label" for="status0">禁用</label>
            </div>
        </div>
        <div class="form-group mb-3">
            <label for="remark">备注</label>
            <textarea class="form-control" id="remark" name="remark" rows="3">{{ location.remark }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{{ url_for('location.list') }}" class="btn btn-secondary">取消</a>
    </form>
{% endblock %}
