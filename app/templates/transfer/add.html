{% extends "base.html" %}
{% block title %}添加调拨单 - 仓库管理系统{% endblock %}

{% block js %}
    <script>
        $(document).ready(function() {
            let rowIndex = 0;
            $("#addItemBtn").click(function() {
                rowIndex++;
                const newRow = `
                    <tr id="itemRow${rowIndex}">
                        <td class="py-3 px-4">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fa fa-shopping-bag"></i>
                                </span>
                                <select class="form-select product-select" name="product_id[]" required>
                                    <option value="">请选择商品</option>
                                    {% for product in products %}
                                        <option value="{{ product.id }}">
                                            {{ product.name }} ({{ product.code }})
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td class="py-3 px-4">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fa fa-map-marker"></i>
                                </span>
                                <select class="form-select" name="source_location_id[]" required>
                                    <option value="">请选择原库位</option>
                                    {% for location in locations %}
                                        <option value="{{ location.id }}">
                                            {{ location.code }} - {{ location.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td class="py-3 px-4">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fa fa-map-marker"></i>
                                </span>
                                <select class="form-select" name="target_location_id[]" required>
                                    <option value="">请选择目标库位</option>
                                    {% for location in locations %}
                                        <option value="{{ location.id }}">
                                            {{ location.code }} - {{ location.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td class="py-3 px-4">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fa fa-cubes"></i>
                                </span>
                                <input type="number" class="form-control quantity-input" name="quantity[]" min="1" required placeholder="数量">
                            </div>
                        </td>
                        <td class="py-3 px-4 text-center">
                            <button type="button" class="btn btn-remove remove-item" data-row="${rowIndex}">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                $("#itemTableBody").append(newRow);
            });

            $(document).on("click", ".remove-item", function() {
                const rowId = $(this).data("row");
                $(`#itemRow${rowId}`).remove();
            });

            $("form").submit(function() {
                const hasItems = $("#itemTableBody tr").length > 0;
                if (!hasItems) {
                    alert("请至少添加一条调拨明细!");
                    return false;
                }
                let isValid = true;
                $(".quantity-input").each(function() {
                    if ($(this).val() <= 0 || !$(this).val()) {
                        alert("数量必须大于0!");
                        isValid = false;
                        return false;
                    }
                });
                return isValid;
            });
        });
    </script>
{% endblock %}

{% block content %}
    <style>
        /* 页面标题霓虹效果 */
        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #b24bf3, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            position: relative;
        }
        
        .page-title-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff, #667eea);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            box-shadow: 
                0 0 25px rgba(0, 212, 255, 0.5),
                0 0 50px rgba(102, 126, 234, 0.3),
                inset 0 0 15px rgba(255, 255, 255, 0.2);
            position: relative;
        }
        
        .page-title-icon i {
            font-size: 1.5rem;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        /* 面包屑导航样式 */
        .breadcrumb {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 0.5rem 1.25rem;
            border: 1px solid rgba(102, 126, 234, 0.2);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
        }
        
        .breadcrumb-item a {
            color: #667eea;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .breadcrumb-item a:hover {
            color: #b24bf3;
            text-shadow: 0 0 8px rgba(178, 75, 243, 0.5);
        }
        
        .breadcrumb-item.active {
            color: #b24bf3;
            font-weight: 600;
        }
        
        /* 表单卡片 - 渐变蓝紫边框 */
        .form-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 3px solid transparent;
            background-clip: padding-box;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.15),
                0 0 40px rgba(102, 126, 234, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.8);
            position: relative;
            padding: 2rem;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .form-card::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(135deg, #00d4ff, #667eea, #b24bf3);
            border-radius: 22px;
            z-index: -1;
        }
        
        /* 表单标签样式 */
        .form-label {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.6rem;
            font-size: 1rem;
            letter-spacing: 0.3px;
        }
        
        /* 输入框组样式 */
        .input-group-text {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px 0 0 12px;
            color: #ffffff;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        
        .input-group-text i {
            font-size: 1.1rem;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }
        
        .input-group:focus-within .input-group-text {
            background: linear-gradient(135deg, #00d4ff, #667eea);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
        
        .form-control, .form-select {
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-left: none;
            border-radius: 0 12px 12px 0;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            font-weight: 500;
            color: #1e293b;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.98);
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2), 0 0 25px rgba(0, 212, 255, 0.15);
            background: #ffffff;
            color: #0f172a;
        }
        
        .form-control::placeholder {
            color: #64748b;
            font-weight: 400;
        }
        
        /* 表格样式 */
        .item-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            border-radius: 12px;
        }
        
        .item-table thead {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }
        
        .item-table thead::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shineEffect 3s infinite;
        }
        
        @keyframes shineEffect {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .item-table th {
            color:#ffffff;
            padding: 1rem 1.25rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }
        
        .item-table td {
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid rgba(102, 126, 234, 0.15);
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .item-table tbody tr {
            transition: all 0.3s ease;
        }
        
        .item-table tbody tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        
        /* 按钮样式 */
        .btn-add-item {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            padding: 0.5rem 1rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        
        .btn-add-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
            color: #ffffff;
        }
        
        .btn-remove {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            padding: 0.45rem 0.75rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(255, 107, 107, 0.3);
        }
        
        .btn-remove:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.5);
            color: #ffffff;
        }
        
        .btn-save {
            background: linear-gradient(135deg, #00d4ff, #667eea, #b24bf3);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            padding: 0.85rem 2.2rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 25px rgba(0, 212, 255, 0.4), 0 0 30px rgba(178, 75, 243, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .btn-save i {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }
        
        .btn-save::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-save:hover::before {
            left: 100%;
        }
        
        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(0, 212, 255, 0.6), 0 0 50px rgba(178, 75, 243, 0.4);
            color: #ffffff;
        }
        
        .btn-cancel {
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #667eea;
            border-radius: 12px;
            color: #667eea;
            padding: 0.7rem 2.2rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        
        .btn-cancel i {
            text-shadow: none;
        }
        
        .btn-cancel:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-cancel:hover i {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }
        
        /* 卡片标题 */
        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
            padding: 1rem 1.5rem;
            background: rgba(102, 126, 234, 0.05);
            border-bottom: 1px solid rgba(102, 126, 234, 0.15);
            border-radius: 16px 16px 0 0;
        }
        
        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .form-card {
                padding: 1.25rem;
            }
            
            .page-title {
                font-size: 1.35rem;
            }
            
            .page-title-icon {
                width: 40px;
                height: 40px;
                margin-right: 10px;
            }
            
            .page-title-icon i {
                font-size: 1.2rem;
            }
            
            .btn-save, .btn-cancel {
                padding: 0.6rem 1.25rem;
                font-size: 0.875rem;
            }
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <div class="page-title-icon">
                <i class="fa fa-exchange"></i>
            </div>
            <h2 class="page-title mb-0">添加调拨单</h2>
        </div>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="{{ url_for('transfer.list') }}">调拨管理</a></li>
                <li class="breadcrumb-item active">添加调拨单</li>
            </ol>
        </nav>
    </div>

    <div class="form-card">
        <form method="POST" action="{{ url_for('transfer.add') }}">
            <div class="row mb-4">
                <div class="col-md-12 mb-3">
                    <label for="remark" class="form-label">备注</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fa fa-comment"></i>
                        </span>
                        <input type="text" class="form-control" id="remark" name="remark" placeholder="输入备注信息(选填)">
                    </div>
                </div>
            </div>

            <hr class="my-4 border-gray-200">

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="card-title mb-0">
                        <i class="fa fa-list-alt mr-2"></i>调拨明细
                    </h5>
                    <button type="button" id="addItemBtn" class="btn btn-add-item">
                        <i class="fa fa-plus mr-1"></i>添加明细
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table item-table">
                        <thead>
                            <tr>
                                <th width="25%" class="text-center">商品</th>
                                <th width="25%" class="text-center">原库位</th>
                                <th width="25%" class="text-center">目标库位</th>
                                <th width="15%" class="text-center">数量</th>
                                <th width="10%" class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="itemTableBody">
                            <tr id="itemRow0">
                                <td class="py-3 px-4">
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fa fa-shopping-bag"></i>
                                        </span>
                                        <select class="form-select product-select" name="product_id[]" required>
                                            <option value="">请选择商品</option>
                                            {% for product in products %}
                                                <option value="{{ product.id }}">
                                                    {{ product.name }} ({{ product.code }})
                                                </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </td>
                                <td class="py-3 px-4">
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fa fa-map-marker"></i>
                                        </span>
                                        <select class="form-select" name="source_location_id[]" required>
                                            <option value="">请选择原库位</option>
                                            {% for location in locations %}
                                                <option value="{{ location.id }}">
                                                    {{ location.code }} - {{ location.name }}
                                                </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </td>
                                <td class="py-3 px-4">
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fa fa-map-marker"></i>
                                        </span>
                                        <select class="form-select" name="target_location_id[]" required>
                                            <option value="">请选择目标库位</option>
                                            {% for location in locations %}
                                                <option value="{{ location.id }}">
                                                    {{ location.code }} - {{ location.name }}
                                                </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </td>
                                <td class="py-3 px-4">
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fa fa-cubes"></i>
                                        </span>
                                        <input type="number" class="form-control quantity-input" name="quantity[]" min="1" required placeholder="数量">
                                    </div>
                                </td>
                                <td class="py-3 px-4 text-center">
                                    <button type="button" class="btn btn-remove remove-item" data-row="0">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="d-flex gap-3">
                <a href="{{ url_for('transfer.list') }}" class="btn btn-cancel">
                    <i class="fa fa-arrow-left mr-2"></i>返回
                </a>
                <button type="submit" class="btn btn-save">
                    <i class="fa fa-save mr-2"></i>保存
                </button>
            </div>
        </form>
    </div>
{% endblock %}
