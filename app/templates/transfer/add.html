{% extends "base.html" %}
{% block title %}添加调拨单 - 仓库管理系统{% endblock %}

{% block js %}
    <script>
        $(document).ready(function() {
            let rowIndex = 0;
            $("#addItemBtn").click(function() {
                rowIndex++;
                const newRow = `
                    <tr id="itemRow${rowIndex}" class="transition-all duration-300 hover:bg-gray-50">
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-shopping-bag text-gray-400"></i>
                                </span>
                                <select class="form-select product-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="product_id[]" required style="flex: 1;">
                                    <option value="">请选择商品</option>
                                    {% for product in products %}
                                        <option value="{{ product.id }}">
                                            {{ product.name }} ({{ product.code }})
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-map-marker text-gray-400"></i>
                                </span>
                                <select class="form-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="source_location_id[]" required style="flex: 1;">
                                    <option value="">请选择原库位</option>
                                    {% for location in locations %}
                                        <option value="{{ location.id }}">
                                            {{ location.code }} - {{ location.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-map-marker text-gray-400"></i>
                                </span>
                                <select class="form-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="target_location_id[]" required style="flex: 1;">
                                    <option value="">请选择目标库位</option>
                                    {% for location in locations %}
                                        <option value="{{ location.id }}">
                                            {{ location.code }} - {{ location.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </td>
                        <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                            <div class="input-group" style="width: 100%;">
                                <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                    <i class="fa fa-cubes text-gray-400"></i>
                                </span>
                                <input type="number" class="form-control quantity-input rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="quantity[]" min="1" required placeholder="数量" style="flex: 1; min-width: 80px;">
                            </div>
                        </td>
                        <td class="py-3 px-4 border-b border-gray-200 text-center">
                            <button type="button" class="btn btn-sm btn-danger rounded-lg hover:bg-red-600 transform hover:-translate-y-1 transition-all duration-300 remove-item" data-row="${rowIndex}">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                $("#itemTableBody").append(newRow);
            });

            $(document).on("click", ".remove-item", function() {
                const rowId = $(this).data("row");
                $(`#itemRow${rowId}`).remove();
            });

            $("form").submit(function() {
                const hasItems = $("#itemTableBody tr").length > 0;
                if (!hasItems) {
                    alert("请至少添加一条调拨明细!");
                    return false;
                }
                let isValid = true;
                $(".quantity-input").each(function() {
                    if ($(this).val() <= 0 || !$(this).val()) {
                        alert("数量必须大于0!");
                        isValid = false;
                        return false;
                    }
                });
                return isValid;
            });
        });
    </script>
{% endblock %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-6">      
        <h2 class="text-2xl font-bold text-gray-800 flex items-center">
            <i class="fa fa-exchange mr-3 text-primary"></i>添加调拨单
        </h2>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('transfer.list') }}">调拨管理</a></li>
                <li class="breadcrumb-item active" aria-current="page">添加调拨单</li>
            </ol>
        </nav>
    </div>

    <div class="card mb-6 shadow-sm rounded-xl overflow-hidden">
        <div class="card-body p-6">
            <form method="POST" action="{{ url_for('transfer.add') }}">
                <div class="row mb-4">
                    <div class="col-md-12 mb-3">
                        <label for="remark" class="form-label">备注</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                <i class="fa fa-comment text-gray-400"></i>
                            </span>
                            <input type="text" class="form-control rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" id="remark" name="remark" placeholder="输入备注信息(选填)">
                        </div>
                    </div>
                </div>

                <hr class="my-4 border-gray-200">

                <div class="mb-6">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="text-lg font-semibold text-gray-700">调拨明细</h5>
                        <button type="button" id="addItemBtn" class="btn btn-sm btn-primary shadow-sm hover:shadow-lg transform hover:-translate-y-1 transition-all duration-300 rounded-lg">
                            <i class="fa fa-plus mr-1"></i>添加明细
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-bordered rounded-lg overflow-hidden">
                            <thead class="bg-gray-50">
                                <tr class="text-gray-700 border-b-2 border-gray-300">
                                    <th width="25%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">商品</th>
                                    <th width="25%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">原库位</th>
                                    <th width="25%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">目标库位</th>
                                    <th width="15%" class="py-3 px-4 border-r border-gray-200 font-semibold text-center">数量</th>
                                    <th width="10%" class="py-3 px-4 font-semibold text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="itemTableBody" class="bg-white">
                                <tr id="itemRow0" class="transition-all duration-300 hover:bg-gray-50">
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group" style="width: 100%;">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-shopping-bag text-gray-400"></i>
                                            </span>
                                            <select class="form-select product-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="product_id[]" required style="flex: 1;">
                                                <option value="">请选择商品</option>
                                                {% for product in products %}
                                                    <option value="{{ product.id }}">
                                                        {{ product.name }} ({{ product.code }})
                                                    </option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group" style="width: 100%;">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-map-marker text-gray-400"></i>
                                            </span>
                                            <select class="form-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="source_location_id[]" required style="flex: 1;">
                                                <option value="">请选择原库位</option>
                                                {% for location in locations %}
                                                    <option value="{{ location.id }}">
                                                        {{ location.code }} - {{ location.name }}
                                                    </option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group" style="width: 100%;">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-map-marker text-gray-400"></i>
                                            </span>
                                            <select class="form-select rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="target_location_id[]" required style="flex: 1;">
                                                <option value="">请选择目标库位</option>
                                                {% for location in locations %}
                                                    <option value="{{ location.id }}">
                                                        {{ location.code }} - {{ location.name }}
                                                    </option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-r border-gray-200 border-b border-gray-200">
                                        <div class="input-group" style="width: 100%;">
                                            <span class="input-group-text bg-light border-gray-300 rounded-l-lg">
                                                <i class="fa fa-cubes text-gray-400"></i>
                                            </span>
                                            <input type="number" class="form-control quantity-input rounded-r-lg border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-20 transition-all duration-300" name="quantity[]" min="1" required placeholder="数量" style="flex: 1; min-width: 80px;">
                                        </div>
                                    </td>
                                    <td class="py-3 px-4 border-b border-gray-200 text-center">
                                        <button type="button" class="btn btn-sm btn-danger rounded-lg hover:bg-red-600 transform hover:-translate-y-1 transition-all duration-300 remove-item" data-row="0">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-3">
                    <a href="{{ url_for('transfer.list') }}" class="btn btn-secondary rounded-lg px-4">
                        <i class="fa fa-arrow-left mr-2"></i>返回
                    </a>
                    <button type="submit" class="btn btn-primary rounded-lg px-4">
                        <i class="fa fa-save mr-2"></i>保存
                    </button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
